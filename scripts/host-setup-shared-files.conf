# scripts/host-setup-shared-files.conf
#
# Host paths that must be group-readable by `homelab-monitor` (the container
# user) and `jakekausler` (the desktop user who edits these files). The
# host-setup.sh script chgrp's each path to `homelab-compose` and chmods
# to 0640 (file) or 0750 (dir). Idempotent.
#
# Why this exists:
# STAGE-003-010 introduced Pull & Restart, which requires the monitor
# container to read .env so `docker compose pull/up -d` can interpolate
# secrets. Owner-only (0600) .env breaks the container's read access.
# Solution: shared group, narrow file list. Secrets are still not
# world-readable; only the dedicated group can read.
#
# Format: one absolute path per line. Comments start with #. Blank lines OK.
# Symlinks are resolved before chgrp. Files MUST exist (script logs warning
# if missing — does NOT create them).
# NOTE: Absolute paths are required so the script can be run from any directory
# and resolve correctly on the host.

/storage/programs/homelab-monitor/deploy/compose/docker-compose.override.yml
