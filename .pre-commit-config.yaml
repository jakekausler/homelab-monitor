default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # Requires pnpm on PATH; CI must install pnpm before running pre-commit
  - repo: local
    hooks:
      - id: prettier-check
        name: prettier (ui)
        language: system
        entry: bash -c 'cd apps/ui && pnpm exec prettier --check .'
        files: ^apps/ui/.*\.(ts|tsx|json|css|html)$
        pass_filenames: false

      - id: eslint-check
        name: eslint (ui)
        language: system
        entry: bash -c 'cd apps/ui && pnpm exec eslint .'
        files: ^apps/ui/.*\.(ts|tsx)$
        pass_filenames: false

      - id: openapi-export
        name: openapi schema export (kernel/api)
        language: system
        entry: bash scripts/export-openapi.sh
        files: ^apps/monitor/homelab_monitor/kernel/api/.*\.py$
        pass_filenames: false

      # NOTE: this hook regenerates apps/ui/src/api/schema.ts when
      # packages/shared-types/openapi.json changes. The previous hook
      # (openapi-export) regenerates openapi.json when kernel/api Python
      # files change. Pre-commit is single-pass, so a commit that touches
      # the kernel API will:
      #   1. Trigger openapi-export, which UPDATES openapi.json (commit aborts; user re-stages)
      #   2. Trigger generate-ui-types on re-commit (because openapi.json changed)
      # i.e. the two-step flow takes 2 commits or one re-add cycle.
      - id: generate-ui-types
        name: generate UI types from openapi.json
        language: system
        entry: bash scripts/generate-ui-types.sh
        files: ^packages/shared-types/openapi\.json$
        pass_filenames: false
