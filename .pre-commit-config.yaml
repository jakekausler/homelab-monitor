default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # Requires pnpm on PATH; CI must install pnpm before running pre-commit
  - repo: local
    hooks:
      - id: prettier-check
        name: prettier (ui)
        language: system
        entry: bash -c 'cd apps/ui && pnpm exec prettier --check .'
        files: ^apps/ui/.*\.(ts|tsx|json|css|html)$
        pass_filenames: false

      - id: eslint-check
        name: eslint (ui)
        language: system
        entry: bash -c 'cd apps/ui && pnpm exec eslint .'
        files: ^apps/ui/.*\.(ts|tsx)$
        pass_filenames: false
