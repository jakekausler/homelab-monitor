[alembic]
script_location = alembic
# NOTE: programmatically overridden by homelab_monitor.kernel.db.migrations._build_config.
# When invoking `alembic` directly, set HOMELAB_MONITOR_DB_URL or pass -x url=... .
sqlalchemy.url = driver://user:pass@host/dbname
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
