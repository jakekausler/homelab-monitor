<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Homelab Monitor</title>
    <script>
      // Pre-React: set theme from localStorage to prevent flash. AppShell
      // takes over after mount.
      ;(function () {
        try {
          var t = localStorage.getItem('homelab-monitor:theme')
          if (t === 'light' || t === 'dark') {
            document.documentElement.dataset.theme = t
          } else {
            document.documentElement.dataset.theme = 'dark'
          }
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
