# Integration test stack for homelab-monitor.
#
# Two usage modes:
#   1. CI:    `docker compose -f docker-compose.test.yml up --abort-on-container-exit`
#             — runs `integration-tests` against `victoriametrics`, exits when done.
#   2. Local: `docker compose -f docker-compose.test.yml up -d victoriametrics`
#             — brings up only VM; run host pytest with VM_URL=http://localhost:8428.
#
# Volumes are NOT persisted (no top-level volumes block); each `up` is fresh.

# NOTE: VM data volume is anonymous — each `up` creates a new ephemeral
# volume. Local devs running `up` repeatedly should `docker compose down -v`
# periodically to clean up.

name: homelab-monitor-test

services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.107.0
    container_name: homelab-vm-test
    networks:
      - homelab-monitor-test-net
    ports:
      - "127.0.0.1:8428:8428"
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=1d"
      - "-httpListenAddr=:8428"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  victorialogs:
    image: victoriametrics/victoria-logs:v0.30.0-victorialogs
    container_name: homelab-vl-test
    networks:
      - homelab-monitor-test-net
    ports:
      - "127.0.0.1:9428:9428"
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=1d"
      - "-httpListenAddr=:9428"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  integration-tests:
    build:
      context: ../..
      dockerfile: apps/monitor/Dockerfile.test
    container_name: homelab-integration-tests
    networks:
      - homelab-monitor-test-net
    environment:
      VM_URL: http://victoriametrics:8428
      VL_URL: http://victorialogs:9428
      AM_URL: http://alertmanager:9093
      VMALERT_URL: http://vmalert-metrics:8880
      VMALERT_LOGS_URL: http://vmalert-logs-test:8880
      HOMELAB_MONITOR_DB_URL: "sqlite+aiosqlite:///:memory:"
    depends_on:
      victoriametrics:
        condition: service_healthy
      victorialogs:
        condition: service_healthy

  # Sidecars for the slow vmalert pipeline test. Default `make test` skips this
  # via the integration-tests --abort-on-container-exit path (these services
  # have no abort-on-container-exit since they are long-running).
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: homelab-alertmanager-test
    networks:
      - homelab-monitor-test-net
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./test-fixtures/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9093/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  karma:
    image: ghcr.io/prymitive/karma:v0.129
    container_name: homelab-karma-test
    networks:
      - homelab-monitor-test-net
    volumes:
      - ../karma/karma.yml:/karma.yml:ro
    command: ["--config.file=/karma.yml"]
    depends_on:
      alertmanager:
        condition: service_healthy
    # No healthcheck — Karma's image is distroless (no wget/curl/sh), and no
    # service `depends_on` Karma's health. Karma starts <2s after AM is healthy.

  kthxbye:
    image: ghcr.io/prymitive/kthxbye:v0.16
    container_name: homelab-kthxbye-test
    networks:
      - homelab-monitor-test-net
    command:
      - "-alertmanager.uri=http://alertmanager:9093"
      # kthxbye enforces extend-by > extend-if-expiring-in; values below
      # are compressed for fast tests but maintain the required ordering.
      - "-extend-by=30s"
      - "-extend-if-expiring-in=15s"
      - "-interval=5s"
      - "-max-duration=2m"
      - "-extend-with-prefix=ACK!"
    depends_on:
      alertmanager:
        condition: service_healthy

  vmalert-metrics:
    image: victoriametrics/vmalert:v1.107.0
    container_name: homelab-vmalert-metrics-test
    networks:
      - homelab-monitor-test-net
    command:
      - "-datasource.url=http://victoriametrics:8428"
      - "-notifier.url=http://alertmanager:9093"
      - "-rule=/etc/vmalert/metrics/*.yaml"
      - "-evaluationInterval=5s"
      - "-configCheckInterval=10s"
      - "-httpListenAddr=:8880"
    volumes:
      - ../vmalert/metrics:/etc/vmalert/metrics:ro
    depends_on:
      alertmanager:
        condition: service_healthy
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8880/-/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  vmalert-logs-test:
    image: victoriametrics/vmalert:v1.107.0
    container_name: homelab-vmalert-logs-test
    networks:
      - homelab-monitor-test-net
    command:
      - "-datasource.url=http://victorialogs:9428"
      - "-notifier.url=http://alertmanager:9093"
      - "-rule=/etc/vmalert/logs/*.yaml"
      - "-evaluationInterval=5s"
      - "-configCheckInterval=10s"
      - "-httpListenAddr=:8880"
    volumes:
      - ../vmalert/logs-test:/etc/vmalert/logs:ro
    depends_on:
      alertmanager:
        condition: service_healthy
      victorialogs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8880/-/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  grafana:
    image: grafana/grafana-oss:12.3.3
    container_name: homelab-grafana-test
    networks:
      - homelab-monitor-test-net
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      victoriametrics:
        condition: service_healthy
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      # NOTE: test compose intentionally diverges from prod compose's sub-path
      # config. Prod uses GF_SERVER_SERVE_FROM_SUB_PATH=true + ROOT_URL with
      # /api/grafana/ suffix because the monitor proxies the prefix through.
      # Test rig hits Grafana directly on 127.0.0.1:3000, bypassing the
      # monitor proxy, so sub-path mode would be wrong here. The end-to-end
      # sub-path forwarding is exercised in STAGE-021's `make dev-prod` rig.
      # See: STAGE-001-021 deliverables for prod-stack validation.
      GF_SERVER_DOMAIN: 127.0.0.1
      GF_SERVER_ROOT_URL: http://127.0.0.1:3000/
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_LIVE_DISABLE: "true"
      GF_INSTALL_PLUGINS: "victoriametrics-logs-datasource 0.26.3"
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "victoriametrics-logs-datasource"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 60s

networks:
  homelab-monitor-test-net:
    name: homelab-monitor-test-net
