# Integration test stack for homelab-monitor.
#
# Two usage modes:
#   1. CI:    `docker compose -f docker-compose.test.yml up --abort-on-container-exit`
#             — runs `integration-tests` against `victoriametrics`, exits when done.
#   2. Local: `docker compose -f docker-compose.test.yml up -d victoriametrics`
#             — brings up only VM; run host pytest with VM_URL=http://localhost:8428.
#
# Volumes are NOT persisted (no top-level volumes block); each `up` is fresh.

# NOTE: VM data volume is anonymous — each `up` creates a new ephemeral
# volume. Local devs running `up` repeatedly should `docker compose down -v`
# periodically to clean up.

name: homelab-monitor-test

services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.107.0
    container_name: homelab-vm-test
    networks:
      - homelab-monitor-test-net
    ports:
      - "127.0.0.1:8428:8428"
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=1d"
      - "-httpListenAddr=:8428"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  victorialogs:
    image: victoriametrics/victoria-logs:v0.30.0-victorialogs
    container_name: homelab-vl-test
    networks:
      - homelab-monitor-test-net
    ports:
      - "127.0.0.1:9428:9428"
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=1d"
      - "-httpListenAddr=:9428"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  integration-tests:
    build:
      context: ../..
      dockerfile: apps/monitor/Dockerfile.test
    container_name: homelab-integration-tests
    networks:
      - homelab-monitor-test-net
    environment:
      VM_URL: http://victoriametrics:8428
      VL_URL: http://victorialogs:9428
      AM_URL: http://alertmanager:9093
      VMALERT_URL: http://vmalert-metrics:8880
      VMALERT_LOGS_URL: http://vmalert-logs-test:8880
      HOMELAB_MONITOR_DB_URL: "sqlite+aiosqlite:///:memory:"
    depends_on:
      victoriametrics:
        condition: service_healthy
      victorialogs:
        condition: service_healthy

  # Sidecars for the slow vmalert pipeline test. Default `make test` skips this
  # via the integration-tests --abort-on-container-exit path (these services
  # have no abort-on-container-exit since they are long-running).
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: homelab-alertmanager-test
    networks:
      - homelab-monitor-test-net
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./test-fixtures/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9093/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  vmalert-metrics:
    image: victoriametrics/vmalert:v1.107.0
    container_name: homelab-vmalert-metrics-test
    networks:
      - homelab-monitor-test-net
    command:
      - "-datasource.url=http://victoriametrics:8428"
      - "-notifier.url=http://alertmanager:9093"
      - "-rule=/etc/vmalert/metrics/*.yaml"
      - "-evaluationInterval=5s"
      - "-configCheckInterval=10s"
      - "-httpListenAddr=:8880"
    volumes:
      - ../vmalert/metrics:/etc/vmalert/metrics:ro
    depends_on:
      alertmanager:
        condition: service_healthy
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8880/-/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  vmalert-logs-test:
    image: victoriametrics/vmalert:v1.107.0
    container_name: homelab-vmalert-logs-test
    networks:
      - homelab-monitor-test-net
    command:
      - "-datasource.url=http://victorialogs:9428"
      - "-notifier.url=http://alertmanager:9093"
      - "-rule=/etc/vmalert/logs/*.yaml"
      - "-evaluationInterval=5s"
      - "-configCheckInterval=10s"
      - "-httpListenAddr=:8880"
    volumes:
      - ../vmalert/logs-test:/etc/vmalert/logs:ro
    depends_on:
      alertmanager:
        condition: service_healthy
      victorialogs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8880/-/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

networks:
  homelab-monitor-test-net:
    name: homelab-monitor-test-net
