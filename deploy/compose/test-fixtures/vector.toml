# Vector test config for STAGE-001-021 integration rig.
# Mounted into the test rig's vector at /etc/vector/vector.toml.
# Tails docker logs of the noisy-logger container ONLY (production vector tails
# all containers). Forwards to the test VL on the test compose network.
#
# Why filter to one container: the canonical e2e test asserts a specific log
# line surfaces, and tailing the entire test rig (every container's stdout)
# would flood VL with noise that makes the test's LogsQL query expensive.

[sources.docker_logs]
type = "docker_logs"
include_containers = ["homelab-noisy-logger-test"]
auto_partial_merge = true

# Multiline codec — MUST stay byte-identical to deploy/vector/vector.toml.template's
# [sources.docker_logs.multiline] block. A drift guard unit test
# (test_vector_template.py::test_test_fixture_multiline_matches_template) enforces this.
[sources.docker_logs.multiline]
start_pattern = '^(\d{4}-\d{2}-\d{2}T?\d{0,2}:?\d{0,2}|\d{4}/\d{2}/\d{2}|(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{1,2}|\w+\[\d+\]:|<\d+>|Traceback \(most recent call last\):|panic:|Exception in thread|[\w.]*(Error|Exception):|Unhandled Exception:|PHP (Fatal|Parse|Warning)|thread .+? panicked|\*\*\* ERROR|fatal:|FATAL:|PANIC:|Crashed:|\[ERROR\]|\[FATAL\]|\[FATA\]|Process \d+|kernel:|sshd\[\d+\]:|Bug:|BUG:|Oops:|general protection fault|Call Trace:|RIP:|CPU:|CMD:|sudo:)'
condition_pattern = '^(\s|#\d+ |Caused by:|stack backtrace:|Stack trace:|goroutine |note:|\.\.\. \d+ more|main\.|0x[0-9a-f]+|thrown in|[\w.]*(Error|Exception):)'
mode = "continue_through"
timeout_ms = 1000

[transforms.add_labels]
type = "remap"
inputs = ["docker_logs"]
source = '''
.host = "noisy-logger"
.service = "noisy-logger"
.severity = "info"
'''

[sinks.vl]
type = "http"
inputs = ["add_labels"]
uri = "http://victorialogs:9428/insert/jsonline?_msg_field=message&_time_field=timestamp&_stream_fields=host,service"
encoding.codec = "json"
framing.method = "newline_delimited"

[sinks.vl.request]
retry_attempts = 3
timeout_secs = 5
headers."Content-Type" = "application/x-ndjson"

[sinks.vl.buffer]
type = "memory"
max_events = 1000
when_full = "drop_newest"
