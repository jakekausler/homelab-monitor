global:
  resolve_timeout: 5m
route:
  group_by: ['alertname', 'target_kind']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'monitor-webhook'
receivers:
  - name: 'monitor-webhook'
    webhook_configs:
      - url: 'http://nowhere.invalid:9999/api/alerts/ingest'
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials: 'test-fixture-token-not-real'
