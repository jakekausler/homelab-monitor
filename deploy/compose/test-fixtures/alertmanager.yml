global:
  resolve_timeout: 60s
route:
  group_by: ['alertname', 'target_kind']
  group_wait: 30s
  group_interval: 30s
  repeat_interval: 4h
  receiver: 'monitor-webhook'
receivers:
  - name: 'monitor-webhook'
    webhook_configs:
      - url: 'http://integration-tests:9090/api/alerts/ingest'
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            # NOT a secret — fixture-only token; the test webhook receiver
            # accepts any Bearer (or none). Left as-is so AM config validates
            # with the real schema.
            credentials: 'test-fixture-token-not-real'
