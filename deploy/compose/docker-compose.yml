# homelab-monitor compose stack: monitor + VictoriaMetrics + vmagent.
# Single file by design (per STAGE-001-015 design decision A).
# Networks/volumes are namespaced; do NOT collide with the operator's existing
# stacks even when --project-name is not set.

name: homelab-monitor

services:
  monitor:
    image: ghcr.io/${GITHUB_REPOSITORY:-jakekausler/homelab-monitor}:${IMAGE_TAG:-latest}
    container_name: homelab-monitor
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    ports:
      - "127.0.0.1:${HOMELAB_MONITOR_PORT:-9090}:9090"
    environment:
      HOMELAB_MONITOR_DB_URL: ${HOMELAB_MONITOR_DB_URL:-sqlite+aiosqlite:////data/homelab-monitor.db}
      HOMELAB_MONITOR_MASTER_KEY: ${HOMELAB_MONITOR_MASTER_KEY}
      HOMELAB_MONITOR_VM_URL: http://victoriametrics:8428
      HOMELAB_MONITOR_VL_URL: http://victorialogs:9428
      HOMELAB_MONITOR_HTTPS_ONLY_COOKIES: ${HOMELAB_MONITOR_HTTPS_ONLY_COOKIES:-true}
      HOMELAB_MONITOR_AUTO_MIGRATE: "1"
      HOMELAB_MONITOR_VM_DATA_DIR: /var/vm-data
      HOMELAB_MONITOR_VL_DATA_DIR: /var/vl-data
      HOMELAB_MONITOR_BACKUP_ROOT: /storage/backup/homelab-monitor
    volumes:
      - data_monitor:/data
      - data_vm:/var/vm-data:ro
      - data_vl:/var/vl-data:ro
      - data_backup:/storage/backup/homelab-monitor
      - ../alertmanager/alertmanager.yml.template:/etc/alertmanager-template/alertmanager.yml.template:ro
      - data_alertmanager_config:/var/alertmanager-config
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/api/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.107.0
    container_name: homelab-vm
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=90d"
      - "-httpListenAddr=:8428"
    volumes:
      - data_vm:/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8428/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  vmagent:
    image: victoriametrics/vmagent:v1.107.0
    container_name: homelab-vmagent
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    command:
      - "-promscrape.config=/etc/vmagent/scrape.yaml"
      - "-remoteWrite.url=http://victoriametrics:8428/api/v1/write"
      - "-remoteWrite.tmpDataPath=/vmagentdata"
    volumes:
      - ./vmagent/scrape.yaml:/etc/vmagent/scrape.yaml:ro
      - data_vmagent:/vmagentdata
    depends_on:
      victoriametrics:
        condition: service_healthy

  # VictoriaLogs is intentionally NOT exposed to the host. All access goes
  # through the monitor's /api/logs/query endpoint (auth-required).
  # vector and the monitor reach VL via the homelab-monitor-net DNS name.
  victorialogs:
    image: victoriametrics/victoria-logs:v0.30.0-victorialogs
    container_name: homelab-victorialogs
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=${HOMELAB_MONITOR_VL_RETENTION_DAYS:-30}d"
      - "-httpListenAddr=:9428"
    volumes:
      - data_vl:/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9428/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  vector:
    image: timberio/vector:0.41.1-debian
    container_name: homelab-vector
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    volumes:
      - ../vector/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/journal:/var/log/journal:ro
    depends_on:
      victorialogs:
        condition: service_healthy

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: homelab-alertmanager
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      # TODO(security): /-/reload is unauthenticated on homelab-monitor-net.
      # Acceptable for trusted single-tenant homelab; gate with --web.config.file
      # basic-auth if multi-tenant or untrusted-network exposure becomes relevant.
      - "--storage.path=/alertmanager"
    volumes:
      - data_alertmanager_config:/etc/alertmanager:ro
    depends_on:
      monitor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  vmalert-metrics:
    image: victoriametrics/vmalert:v1.107.0
    container_name: homelab-vmalert-metrics
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    command:
      - "-datasource.url=http://victoriametrics:8428"
      - "-notifier.url=http://alertmanager:9093"
      - "-rule=/etc/vmalert/metrics/*.yaml"
      - "-evaluationInterval=30s"
      - "-configCheckInterval=30s"
      - "-httpListenAddr=:8880"
    volumes:
      - ../vmalert/metrics:/etc/vmalert/metrics:ro
    depends_on:
      alertmanager:
        condition: service_healthy
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8880/-/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  vmalert-logs:
    image: victoriametrics/vmalert:v1.107.0
    container_name: homelab-vmalert-logs
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    command:
      - "-datasource.url=http://victorialogs:9428"
      - "-notifier.url=http://alertmanager:9093"
      - "-rule=/etc/vmalert/logs/*.yaml"
      - "-evaluationInterval=30s"
      - "-configCheckInterval=30s"
      - "-httpListenAddr=:8880"
    volumes:
      - ../vmalert/logs:/etc/vmalert/logs:ro
    depends_on:
      alertmanager:
        condition: service_healthy
      victorialogs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8880/-/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  homelab-monitor-net:
    name: homelab-monitor-net

volumes:
  data_monitor:
  data_vm:
  data_vmagent:
  data_vl:
  data_backup:
  data_alertmanager_config:
