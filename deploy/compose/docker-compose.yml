# homelab-monitor compose stack: monitor + VictoriaMetrics + vmagent.
# Single file by design (per STAGE-001-015 design decision A).
# Networks/volumes are namespaced; do NOT collide with the operator's existing
# stacks even when --project-name is not set.

name: homelab-monitor

services:
  monitor:
    image: ghcr.io/${GITHUB_REPOSITORY:-jakekausler/homelab-monitor}:${IMAGE_TAG:-latest}
    build:
      context: ../../
      dockerfile: apps/monitor/Dockerfile
    container_name: homelab-monitor
    labels:
      homelab-monitor.http.health: "http://container:9090/api/healthz"
    restart: unless-stopped
    user: "${HM_CRON_HOST_UID:-1000}:${HM_CRON_HOST_GID:-1000}"
    networks:
      - homelab-monitor-net
    ports:
      - "${HOMELAB_MONITOR_BIND_HOST:-127.0.0.1}:${HOMELAB_MONITOR_PORT:-9090}:9090"
    environment:
      HOMELAB_MONITOR_DB_URL: ${HOMELAB_MONITOR_DB_URL:-sqlite+aiosqlite:////data/homelab-monitor.db}
      HOMELAB_MONITOR_MASTER_KEY: ${HOMELAB_MONITOR_MASTER_KEY}
      HOMELAB_MONITOR_PUBLIC_URL: ${HOMELAB_MONITOR_PUBLIC_URL:-}
      HOMELAB_MONITOR_VM_URL: http://victoriametrics:8428
      HOMELAB_MONITOR_VL_URL: http://victorialogs:9428
      HOMELAB_MONITOR_HTTPS_ONLY_COOKIES: ${HOMELAB_MONITOR_HTTPS_ONLY_COOKIES:-true}
      HOMELAB_MONITOR_AUTO_MIGRATE: "1"
      HOMELAB_MONITOR_VM_DATA_DIR: /var/vm-data
      HOMELAB_MONITOR_VL_DATA_DIR: /var/vl-data
      HOMELAB_MONITOR_UI_DIR: /app/ui
      HOMELAB_MONITOR_BACKUP_ROOT: /storage/backup/homelab-monitor
      HM_CRON_HOST_ROOT: /host
      HM_CRON_SNAPSHOT_DIR: /host-crontab-snapshot
      HM_CRON_DISCOVERY_INTERVAL_SECONDS: ${HM_CRON_DISCOVERY_INTERVAL_SECONDS:-300}
      HM_HOST_HOSTNAME: ${HM_HOST_HOSTNAME:-}
      HM_CRON_APPLY_IPC_DIR: /host-ipc
      VECTOR_DOCKER_EXCLUDE: ${VECTOR_DOCKER_EXCLUDE:-}
      # STAGE-003-009: locally-built image-update detection.
      # When set, mounts the host compose dir at /host-compose:ro and the
      # collector reads <dir>/docker-compose.yml to find build: services.
      # Unset = feature disabled (public release default).
      HOMELAB_MONITOR_COMPOSE_DIR: /host-compose
      HOMELAB_MONITOR_LOCAL_BUILD_INTERVAL_SECONDS: ${HOMELAB_MONITOR_LOCAL_BUILD_INTERVAL_SECONDS:-1800}
      HOMELAB_MONITOR_BUILD_SOURCES_CONFIG_PATH: ${HOMELAB_MONITOR_BUILD_SOURCES_CONFIG_PATH:-/config/docker/build-sources.yaml}
      # Bounded source-hash limits. Operators with large build contexts (assets,
      # media, multi-GB monorepos) can raise these via .env. Defaults match
      # apps/monitor/homelab_monitor/kernel/docker/source_hash.py.
      HOMELAB_MONITOR_BUILD_HASH_MAX_FILE_BYTES: ${HOMELAB_MONITOR_BUILD_HASH_MAX_FILE_BYTES:-10485760}
      HOMELAB_MONITOR_BUILD_HASH_MAX_TOTAL_BYTES: ${HOMELAB_MONITOR_BUILD_HASH_MAX_TOTAL_BYTES:-1073741824}
      HOMELAB_MONITOR_BUILD_HASH_MAX_FILE_COUNT: ${HOMELAB_MONITOR_BUILD_HASH_MAX_FILE_COUNT:-50000}
      HOMELAB_MONITOR_BUILD_HASH_MAX_DEPTH: ${HOMELAB_MONITOR_BUILD_HASH_MAX_DEPTH:-30}
      # STAGE-003-010: compose action runner.
      HOMELAB_MONITOR_COMPOSE_ACTION_TIMEOUT_SECONDS: ${HOMELAB_MONITOR_COMPOSE_ACTION_TIMEOUT_SECONDS:-300}
      # Docker CLI needs a writable HOME for its config dir (~/.docker). Container's
      # default HOME is / which is root-owned; redirect to /tmp.
      HOME: /tmp
      DOCKER_CONFIG: /tmp/.docker
    group_add:
      - "${HM_HOST_DOCKER_GID:-999}"
      # STAGE-003-010: homelab-compose group grants read access to /storage/docker/compose/.env
      # for `docker compose pull/up -d` env interpolation. GID is host-specific
      # (host-setup.sh creates the group; see scripts/host-setup-shared-files.conf).
      - "${HM_HOST_COMPOSE_GID:-994}"
    volumes:
      - data_monitor:/data
      - data_vm:/var/vm-data:ro
      - data_vl:/var/vl-data:ro
      - data_backup:/storage/backup/homelab-monitor
      - ../alertmanager/alertmanager.yml.template:/etc/alertmanager-template/alertmanager.yml.template:ro
      - data_alertmanager_config:/var/alertmanager-config
      - ../vector/vector.toml.template:/etc/vector-template/vector.toml.template:ro
      - data_vector_config:/var/vector-config
      - data_vmalert_user_logs:/var/vmalert-user-logs
      - data_vmalert_user_metrics:/var/vmalert-user-metrics
      # Host crontab locations are mounted READ-ONLY: the monitor container
      # (uid 995) only READS crontabs for discovery. EVERY host write — crontab
      # rewrites, the wrapper script, the token file — goes through the
      # host-side cron-apply executor (STAGE-002-009) via the cron-apply IPC
      # mount below. The container has NO write mount on the host filesystem
      # except that IPC directory; that is the single privilege boundary.
      #
      # /etc is mounted READ-ONLY: discovery reads /etc/crontab + /etc/cron.d.
      # The container never writes under /etc — the token write to
      # /etc/homelab-monitor is performed by the executor.
      # There is intentionally NO /usr/local/bin mount: the wrapper script is
      # written by the executor, not the container.
      - /etc:/host/etc:ro
      # User crontabs are read via the root-generated crontab snapshot
      # (STAGE-002-009 Option B fix): hm-crontab-snapshot writes one
      # world-readable file per user into this host dir; the discoverer reads
      # it instead of the 0600 spool files (which keep their cron-required
      # 0600-no-ACL mode). READ-ONLY — the container never writes the snapshot.
      - /var/lib/homelab-monitor/crontab-snapshot:/host-crontab-snapshot:ro
      # Cron-apply IPC: the monitor writes request JSON into requests/, the
      # host-side hm-cron-apply executor writes result JSON into results/.
      # This is the ONLY read-write host mount.
      - /var/lib/homelab-monitor/cron-apply:/host-ipc:rw
      # Host /proc mounted READ-ONLY: HeartbeatStateCollector and the host
      # collector read /host/proc/stat `btime` (host boot time). Docker cannot
      # reliably bind-mount an individual synthetic /proc file, so the whole
      # /proc is mounted ro — /proc/stat btime is world-readable. Used for
      # @reboot cron lateness and a correct homelab_host_uptime_seconds.
      - /proc:/host/proc:ro
      # STAGE-003-010: docker socket RW for Pull & Restart compose actions.
      # Security boundary: socket access is root-equivalent on host (accepted per
      # EPIC-003 cross-stage criterion #18). Auto-fix runs are confirm-gated +
      # audit-logged + per-runbook rate-limited; manual Pull & Restart is the
      # only Stage-010 actor.
      - /var/run/docker.sock:/var/run/docker.sock
      # STAGE-003-007 D-MOUNT-PATH-PROD: per-container override YAML files.
      # Per-service Docker probe overrides (STAGE-003-007).
      # Operator creates YAML files at $HOMELAB_MONITOR_OVERRIDES_DIR/plugins/docker/<container>.yaml on the host.
      # Container loader scans /config/plugins/docker/*.yaml (HOMELAB_MONITOR_DOCKER_OVERRIDES_DIR default).
      # Host default /var/lib/homelab-monitor/overrides matches the existing
      # state-dir convention. Read-only inside container; empty by default =
      # OverrideLoader is a no-op.
      - ${HOMELAB_MONITOR_OVERRIDES_DIR:-/var/lib/homelab-monitor/overrides}:/config:ro
      # STAGE-003-009: read-only mount of the host compose directory for
      # locally-built image-update detection. The compose reader and
      # source-hasher walk this tree but never write to it.
      # Operator-doc caveat: the monitor will read every file under this
      # path; do not store plaintext secrets here.
      # When HOMELAB_MONITOR_COMPOSE_DIR (host path) is unset, this mount
      # resolves to an empty source — set it in deploy/compose/.env.
      - ${HOMELAB_MONITOR_COMPOSE_DIR:-/dev/null}:/host-compose:ro
      # STAGE-003-009 (scope expansion): optional generic build-context mount.
      # The operator YAML at /config/docker/build-sources.yaml can use
      # container_prefix paths starting with /host-build-contexts/... to
      # resolve absolute host build-context paths that the single
      # $HOMELAB_MONITOR_COMPOSE_DIR mount can't reach. Unset = /dev/null
      # (harmless, never matched). For more complex layouts use a custom
      # docker-compose.override.yml in your host-specific overrides repo.
      - ${HOMELAB_MONITOR_BUILD_CONTEXTS_DIR:-/dev/null}:/host-build-contexts:ro
    depends_on:
      victoriametrics:
        condition: service_healthy
      config-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9090/api/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # One-shot: fix the MODE of the render-config volumes BEFORE the monitor and
  # the vector/alertmanager sidecars start. A fresh named volume mounted by a
  # sidecar is seeded from that sidecar image's non-empty stock config dir
  # (root:root 0755), which the non-root monitor (user: ${HM_CRON_HOST_UID})
  # cannot write. This root one-shot chmods both volumes to 3777
  # (setgid+sticky+rwx-all) so the monitor can create the rendered config
  # files, then exits. depends_on gates the monitor and the vector/alertmanager
  # sidecars on its successful completion.
  #
  # NON-DESTRUCTIVE BY DESIGN: this container only chmods. It MUST NOT delete
  # anything. The monitor's render-on-boot is the only writer of vector.toml /
  # alertmanager.yml, and it runs on the MONITOR's lifecycle, not this one.
  # compose re-runs this init whenever vector/alertmanager are recreated
  # (depends_on: service_completed_successfully) WITHOUT recreating the
  # monitor — so a destructive op here would wipe the rendered config and the
  # sidecar would crash-loop. chmod is idempotent and safe to re-run forever.
  # Stray stock seed files (timberio's vector.yaml, prom's alertmanager.yml)
  # are harmless: vector --config and alertmanager --config.file each name ONE
  # explicit file; neither scans the directory.
  config-init:
    image: busybox:1.36
    container_name: homelab-config-init
    user: "0:0"
    environment:
      HM_CRON_HOST_UID: ${HM_CRON_HOST_UID:-1000}
    command:
      - sh
      - -c
      - >
        chown 0:2000 /var/vector-config /var/alertmanager-config /var/vmalert-user-logs /var/vmalert-user-metrics &&
        chmod 3777 /var/vector-config /var/alertmanager-config /var/vmalert-user-logs /var/vmalert-user-metrics &&
        if [ -f /var/alertmanager-config/alertmanager.yml ]; then chown ${HM_CRON_HOST_UID:-1000}:2000 /var/alertmanager-config/alertmanager.yml; fi &&
        echo "config-init: render-config volumes set to root:amconfig 3777, am seed reowned to monitor uid"
    volumes:
      - data_vector_config:/var/vector-config
      - data_alertmanager_config:/var/alertmanager-config
      - data_vmalert_user_logs:/var/vmalert-user-logs
      - data_vmalert_user_metrics:/var/vmalert-user-metrics
    restart: "no"
    networks:
      - homelab-monitor-net

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.107.0
    container_name: homelab-vm
    labels:
      homelab-monitor.http.health: "http://container:8428/health"
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=90d"
      - "-httpListenAddr=:8428"
    volumes:
      - data_vm:/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8428/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  vmagent:
    image: victoriametrics/vmagent:v1.107.0
    container_name: homelab-vmagent
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    command:
      - "-promscrape.config=/etc/vmagent/scrape.yaml"
      - "-remoteWrite.url=http://victoriametrics:8428/api/v1/write"
      - "-remoteWrite.tmpDataPath=/vmagentdata"
    volumes:
      - ./vmagent/scrape.yaml:/etc/vmagent/scrape.yaml:ro
      - ./vmagent/targets.d:/etc/vmagent/targets.d:ro
      - data_vmagent:/vmagentdata
    depends_on:
      victoriametrics:
        condition: service_healthy

  # cadvisor exposes per-container resource metrics (CPU, RAM, network, fs)
  # on :8080/metrics. The vmagent scrape job `cadvisor` (in scrape.yaml) keeps
  # a curated subset of the ~150 series cadvisor emits — see scrape.yaml
  # header for the allowlist.
  #
  # Security posture (D-CADVISOR-LEAST-PRIV): NOT privileged; no extra
  # capabilities. The /var/run/docker.sock mount is READ-ONLY in this stage
  # and remains so through STAGE-003-008; STAGE-003-009 widens to RW for
  # Pull & Restart. The :ro flag is the security boundary.
  #
  # CLI flags (D-CADVISOR-FLAGS):
  #   --docker_only=true                 skip non-Docker cgroups + kernel threads
  #   --store_container_labels=false     drop all container labels by default
  #   --whitelisted_container_labels=... pass through only the labels we use
  #
  # The whitelisted label list MUST include `homelab-monitor.*` so STAGE-003-005's
  # label-based probe discovery sees those labels as Prometheus labels. Those
  # labels do not exist on any container yet (STAGE-003-001) — they begin
  # appearing in STAGE-003-005.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: homelab-cadvisor
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    privileged: false
    command:
      - "--docker_only=true"
      - "--store_container_labels=false"
      - "--whitelisted_container_labels=homelab-monitor.*,org.label-schema.*,com.docker.compose.*"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # VictoriaLogs is intentionally NOT exposed to the host. All access goes
  # through the monitor's /api/logs/query endpoint (auth-required).
  # vector and the monitor reach VL via the homelab-monitor-net DNS name.
  victorialogs:
    image: victoriametrics/victoria-logs:v0.30.0-victorialogs
    container_name: homelab-victorialogs
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=${HOMELAB_MONITOR_VL_RETENTION_DAYS:-30}d"
      - "-httpListenAddr=:9428"
    volumes:
      - data_vl:/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9428/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  vector:
    image: timberio/vector:0.41.1-debian
    container_name: homelab-vector
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    # group_add 2000 (amconfig) so Vector can read the 0640 rendered
    # /etc/vector/vector.toml — the monitor chowns the rendered config to
    # GID 2000 at boot (mirrors the alertmanager render-on-boot mechanism).
    group_add:
      - "2000"
    environment:
      VECTOR_DATA_DIR: /var/lib/vector
    # Redaction metrics (STAGE-004-006): prometheus_exporter on :9598, scraped
    # by vmagent over homelab-monitor-net (job_name: vector). Not host-published.
    expose:
      - "9598"
    # STAGE-007-016: UDM CEF-over-syslog UDP listener. The DELIBERATE prod
    # LAN-exposure exception — a real LAN syslog source (the UDM Pro) cannot
    # reach a container-internal sidecar, so this is the ONE prod sidecar port
    # published, on 0.0.0.0 (not 127.0.0.1) by necessity. Configurable via
    # HM_UDM_SYSLOG_BIND_HOST / HM_UDM_SYSLOG_PORT in deploy/compose/.env.
    ports:
      - "${HM_UDM_SYSLOG_BIND_HOST:-0.0.0.0}:${HM_UDM_SYSLOG_PORT:-5514}:5514/udp"
    # The monitor renders vector.toml (with the cron-events ingest token
    # substituted) into data_vector_config at boot. Vector --configs the
    # rendered file. A named volume cannot overlay a single file path, so the
    # volume is mounted as a DIRECTORY and --config points at <dir>/vector.toml
    # (same pattern as alertmanager's config-dir mount).
    command: ["--config", "/etc/vector/vector.toml"]
    volumes:
      - data_vector_config:/etc/vector:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/journal:/var/log/journal:ro
      # journalctl's default journal discovery is machine-id-scoped: it looks
      # in /var/log/journal/<machine-id>/. The vector image bakes its own
      # /etc/machine-id, which never matches the host's, so journalctl finds
      # "No journal files" and the journald source reads zero entries. Mount
      # the host machine-id so discovery resolves to the host's journal dir.
      - /etc/machine-id:/etc/machine-id:ro
      - data_vector:/var/lib/vector
    depends_on:
      victorialogs:
        condition: service_healthy
      monitor:
        condition: service_healthy
      config-init:
        condition: service_completed_successfully

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: homelab-alertmanager
    labels:
      homelab-monitor.http.health: "http://container:9093/-/healthy"
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    group_add:
      - "2000"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      # TODO(security): /-/reload is unauthenticated on homelab-monitor-net.
      # Acceptable for trusted single-tenant homelab; gate with --web.config.file
      # basic-auth if multi-tenant or untrusted-network exposure becomes relevant.
      - "--storage.path=/alertmanager"
    volumes:
      - data_alertmanager_config:/etc/alertmanager:ro
    depends_on:
      monitor:
        condition: service_healthy
      config-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  karma:
    image: ghcr.io/prymitive/karma:v0.129
    container_name: homelab-karma
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    volumes:
      - ../karma/karma.yml:/karma.yml:ro
    command: ["--config.file=/karma.yml"]
    depends_on:
      alertmanager:
        condition: service_healthy
    # No healthcheck — Karma's image is distroless (no wget/curl/sh available
    # for CMD-SHELL). No other service `depends_on` Karma's health, so the
    # absence of a healthcheck is acceptable. Karma's own readiness is observed
    # via the monitor's reverse proxy returning 502 if Karma is briefly down.

  kthxbye:
    image: ghcr.io/prymitive/kthxbye:v0.16
    container_name: homelab-kthxbye
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    command:
      - "-alertmanager.uri=http://alertmanager:9093"
      # kthxbye flag-ordering invariant: extend-by MUST be > extend-if-expiring-in.
      # Timing math: kthxbye polls every `interval=1m`. When a silence has
      # `extend-if-expiring-in=6m` left, kthxbye fires an extension that adds
      # `extend-by=10m` to the silence's endsAt. Net: kthxbye has a 4m margin
      # (10m - 6m) before any silence can naturally expire while alert fires.
      # `max-duration=24h` caps total silence lifetime regardless of extensions.
      - "-extend-by=10m"
      - "-max-duration=24h"
      - "-extend-if-expiring-in=6m"
      - "-interval=1m"
      - "-extend-with-prefix=ACK!"
    depends_on:
      alertmanager:
        condition: service_healthy

  vmalert-metrics:
    image: victoriametrics/vmalert:v1.107.0
    container_name: homelab-vmalert-metrics
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    command:
      - "-datasource.url=http://victoriametrics:8428"
      - "-notifier.url=http://alertmanager:9093"
      - "-remoteWrite.url=http://victoriametrics:8428"
      - "-rule=/etc/vmalert/metrics/*.yaml"
      - "-rule=/etc/vmalert/metrics-user/*.yaml"
      - "-evaluationInterval=30s"
      - "-configCheckInterval=30s"
      - "-httpListenAddr=:8880"
    volumes:
      - ../vmalert/metrics:/etc/vmalert/metrics:ro
      - data_vmalert_user_metrics:/etc/vmalert/metrics-user:ro
    depends_on:
      alertmanager:
        condition: service_healthy
      victoriametrics:
        condition: service_healthy
    healthcheck:
      # vmalert exposes /-/healthy (VictoriaMetrics convention); VL exposes /health.
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8880/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  vmalert-logs:
    image: victoriametrics/vmalert:v1.107.0
    container_name: homelab-vmalert-logs
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    command:
      - "-datasource.url=http://victorialogs:9428"
      - "-notifier.url=http://alertmanager:9093"
      - "-rule=/etc/vmalert/logs/*.yaml"
      - "-rule=/etc/vmalert/logs-user/*.yaml"
      - "-evaluationInterval=30s"
      - "-configCheckInterval=30s"
      - "-httpListenAddr=:8880"
    volumes:
      - ../vmalert/logs:/etc/vmalert/logs:ro
      - data_vmalert_user_logs:/etc/vmalert/logs-user:ro
    depends_on:
      alertmanager:
        condition: service_healthy
      victorialogs:
        condition: service_healthy
    healthcheck:
      # vmalert exposes /-/healthy (VictoriaMetrics convention); VL exposes /health.
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8880/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  grafana:
    # Custom image with VL datasource plugin baked in.
    # Local builds: deploy/grafana/ (Dockerfile + README).
    # GHCR push: STAGE-001-021 Spec C grafana-image.yml workflow.
    # Until Spec C lands, `docker compose build grafana` produces the image
    # locally with the GHCR tag.
    image: ghcr.io/jakekausler/homelab-monitor-grafana:latest
    build:
      context: ../grafana
      dockerfile: Dockerfile
    container_name: homelab-grafana
    labels:
      homelab-monitor.http.health: "http://container:3000/api/health"
    restart: unless-stopped
    networks:
      - homelab-monitor-net
    depends_on:
      victoriametrics:
        condition: service_healthy
    volumes:
      - data_grafana:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      # GF_SERVER_DOMAIN + GF_SERVER_ROOT_URL are templated so the same
      # docker-compose.yml works for:
      #   - local dev: GRAFANA_PUBLIC_URL=http://127.0.0.1:9090/api/grafana/
      #   - nginx/TLS: GRAFANA_PUBLIC_URL=https://homelab.example.com/api/grafana/
      # GF_SERVER_DOMAIN must match the host portion of GRAFANA_PUBLIC_URL.
      GF_SERVER_DOMAIN: ${GRAFANA_PUBLIC_DOMAIN:-127.0.0.1}
      GF_SERVER_ROOT_URL: ${GRAFANA_PUBLIC_URL:-http://127.0.0.1:9090/api/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: lax
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_LIVE_DISABLE: "true"
      # Plugin install (victoriametrics-logs-datasource) is baked into the
      # custom image (deploy/grafana/Dockerfile). GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS
      # is also baked in as ENV. Do NOT set either here.
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  homelab-monitor-net:
    name: homelab-monitor-net

volumes:
  data_monitor:
  data_vm:
  data_vmagent:
  data_vl:
  data_vector:
  data_vector_config:
  data_backup:
  data_alertmanager_config:
  data_grafana:
  data_vmalert_user_logs:
  data_vmalert_user_metrics:
