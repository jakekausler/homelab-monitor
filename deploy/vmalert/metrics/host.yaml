# vmalert host metric rules. Picked up by the vmalert sidecar.
# Severity vocabulary locked: info / warning / error / critical (spec §8.2).
#
# `for: 10m` thresholds intentionally won't fire in the fast `make test-fast` rig
# (-retentionPeriod=1d) — that's by design. The slow integration test
# (apps/monitor/tests/integration/test_vmalert_pipeline.py) drops `for:` to 0s
# via a runtime override or otherwise stages a synthetic firing path.

groups:
  - name: host
    interval: 30s
    rules:
      - alert: HostHighCPU
        expr: avg_over_time(homelab_host_cpu_percent{cpu="all"}[5m]) > 90
        for: 10m
        labels:
          severity: warning
          source_tool: vmalert-metrics
          target_kind: host
        annotations:
          summary: "Host CPU above 90% for 10m"
          description: 'Host {{ $labels.host }} CPU at {{ $value }}% (avg over 5m, sustained 10m)'

      - alert: HostHighMemory
        expr: homelab_host_memory_bytes{type="used"} / ignoring(type) homelab_host_memory_bytes{type="total"} > 0.9
        for: 10m
        labels:
          severity: warning
          source_tool: vmalert-metrics
          target_kind: host
        annotations:
          summary: "Host memory above 90% for 10m"
          description: 'Host {{ $labels.host }} memory utilization {{ $value | humanizePercentage }}'

      # TODO: Uncomment once FailureBudget emits
