# Rule unit-test fixtures for deploy/vmalert/metrics/home-assistant.yaml.
# Schema: Prometheus / vmalert rule unit-test format.
# Run manually: vmalert -rule.config=../home-assistant.yaml -rule.testFile=home-assistant.tests.yaml
#   (via docker: victoriametrics/vmalert:v1.107.0 — no vmalert/promtool binary on this host)
# (No make target wires this yet — forward-compatible static fixture, NOT CI-run.
#  Consistent with every other __tests__/*.tests.yaml in this directory.)
#
# ANNOTATION NOTE: rules whose summary contains {{ $value }} (HaBatteryCritical,
# HaBatteryLow, HaUpdatesPending) assert exp_labels ONLY and omit exp_annotations,
# matching how every existing fixture treats dynamically-valued annotations. Rules
# with static / {{ $labels.* }}-only summaries assert the rendered summary.

rule_files:
  - ../home-assistant.yaml

evaluation_interval: 30s

tests:
  # === HaUnreachable (for: 2m) ===
  # FIRE: homelab_ha_up==0 held well past 2m.
  - interval: 30s
    input_series:
      - series: 'homelab_ha_up'
        values: '0+0x10'
    alert_rule_test:
      - eval_time: 3m
        alertname: HaUnreachable
        exp_alerts:
          - exp_labels:
              severity: critical
              source_tool: vmalert-metrics
              target_kind: container
              integration: home_assistant
            exp_annotations:
              summary: "Home Assistant is unreachable"

  # NO-FIRE: HA is up (==1).
  - interval: 30s
    input_series:
      - series: 'homelab_ha_up'
        values: '1+0x10'
    alert_rule_test:
      - eval_time: 3m
        alertname: HaUnreachable
        exp_alerts: []

  # === HaConfigEntryError (for: 5m) ===
  # FIRE: setup_error==1 held past 5m. Asserts passthrough domain/title/state labels (STAGE-005-032).
  - interval: 30s
    input_series:
      - series: 'homelab_ha_config_entry_setup_error{domain="zwave_js",title="Z-Wave JS",state="setup_error"}'
        values: '1+0x20'
    alert_rule_test:
      - eval_time: 6m
        alertname: HaConfigEntryError
        exp_alerts:
          - exp_labels:
              severity: error
              source_tool: vmalert-metrics
              target_kind: container
              integration: home_assistant
              domain: zwave_js
              title: Z-Wave JS
              state: setup_error
            exp_annotations:
              summary: "HA config entry in error (setup_error): Z-Wave JS (zwave_js)"

  # NO-FIRE: setup_error==0.
  - interval: 30s
    input_series:
      - series: 'homelab_ha_config_entry_setup_error{domain="zwave_js",title="Z-Wave JS"}'
        values: '0+0x20'
    alert_rule_test:
      - eval_time: 6m
        alertname: HaConfigEntryError
        exp_alerts: []

  # === HaBatteryCritical + HaBatteryLow band dedup (for: 10m each) ===
  # DEDUP TEST A: battery at 5% -> fires HaBatteryCritical, NOT HaBatteryLow.
  # exp_labels only (summary contains {{ $value }}).
  - interval: 30s
    input_series:
      - series: 'homelab_ha_battery_level{entity_id="sensor.door_battery",domain="sensor"}'
        values: '5+0x30'
    alert_rule_test:
      - eval_time: 11m
        alertname: HaBatteryCritical
        exp_alerts:
          - exp_labels:
              severity: error
              source_tool: vmalert-metrics
              target_kind: container
              integration: home_assistant
              entity_id: sensor.door_battery
              domain: sensor
      - eval_time: 11m
        alertname: HaBatteryLow
        exp_alerts: []

  # DEDUP TEST B: battery at 15% -> fires HaBatteryLow, NOT HaBatteryCritical.
  - interval: 30s
    input_series:
      - series: 'homelab_ha_battery_level{entity_id="sensor.window_battery",domain="sensor"}'
        values: '15+0x30'
    alert_rule_test:
      - eval_time: 11m
        alertname: HaBatteryLow
        exp_alerts:
          - exp_labels:
              severity: warning
              source_tool: vmalert-metrics
              target_kind: container
              integration: home_assistant
              entity_id: sensor.window_battery
              domain: sensor
      - eval_time: 11m
        alertname: HaBatteryCritical
        exp_alerts: []

  # NO-FIRE: healthy battery at 80% -> neither alert fires.
  - interval: 30s
    input_series:
      - series: 'homelab_ha_battery_level{entity_id="sensor.thermostat_battery",domain="sensor"}'
        values: '80+0x30'
    alert_rule_test:
      - eval_time: 11m
        alertname: HaBatteryCritical
        exp_alerts: []
      - eval_time: 11m
        alertname: HaBatteryLow
        exp_alerts: []

  # === HaUpdatesPending (for: 15m, count() aggregation) ===
  # FIRE: 3 update_available==1 series -> count()=3 > 0. Alert carries ONLY the
  # rule's own labels (count() yields an empty label set). exp_labels only
  # (summary contains {{ $value }} = the count). One alert instance expected.
  - interval: 30s
    input_series:
      - series: 'homelab_ha_update_available{entity_id="update.core",title="Home Assistant Core"}'
        values: '1+0x40'
      - series: 'homelab_ha_update_available{entity_id="update.os",title="Home Assistant OS"}'
        values: '1+0x40'
      - series: 'homelab_ha_update_available{entity_id="update.zigbee2mqtt",title="Zigbee2MQTT"}'
        values: '1+0x40'
    alert_rule_test:
      - eval_time: 16m
        alertname: HaUpdatesPending
        exp_alerts:
          - exp_labels:
              severity: info
              source_tool: vmalert-metrics
              target_kind: container
              integration: home_assistant

  # NO-FIRE: all updates applied (==0) -> count(==1)=0, > 0 is false, empty result.
  - interval: 30s
    input_series:
      - series: 'homelab_ha_update_available{entity_id="update.core",title="Home Assistant Core"}'
        values: '0+0x40'
      - series: 'homelab_ha_update_available{entity_id="update.os",title="Home Assistant OS"}'
        values: '0+0x40'
    alert_rule_test:
      - eval_time: 16m
        alertname: HaUpdatesPending
        exp_alerts: []

  # =============================================================================
  # STAGE-005-039 REGRESSION: OPT-IN rules must NOT fire as active defaults.
  #
  # The four rules below (HaEntityUnavailable, HaEntityStale, HaAutomationIdle,
  # HaAutomationDisabled) are intentionally COMMENTED OUT in home-assistant.yaml
  # — they are opt-in exemplars, not active defaults. These tests assert that
  # input which WOULD trip a blanket form produces NO alerts. They pass precisely
  # because the rules do not exist in the loaded rule_files. If a future session
  # uncomments one of these rules without re-grounding the noise analysis, the
  # corresponding test WILL FAIL (the alert will fire on the synthetic input),
  # flagging the change immediately.
  # =============================================================================

  # STAGE-005-039 NO-FIRE: HaEntityUnavailable is opt-in / commented out.
  # Input: entity_available==0 held 10m — would trip a blanket `== 0` rule.
  # Expected: no alert (rule is not loaded).
  - interval: 30s
    input_series:
      - series: 'homelab_ha_entity_available{entity_id="sensor.plex_playing",domain="sensor"}'
        values: '0+0x20'
    alert_rule_test:
      - eval_time: 10m
        alertname: HaEntityUnavailable
        exp_alerts: []

  # STAGE-005-039 NO-FIRE: HaEntityStale is opt-in / commented out.
  # Input: last_changed_seconds==172800 (48h) held 20m — would trip any blanket
  # threshold rule (>3600 @1h, >86400 @24h, >604800 @7d).
  # Expected: no alert (rule is not loaded).
  - interval: 30s
    input_series:
      - series: 'homelab_ha_entity_last_changed_seconds{entity_id="sensor.door_closed",domain="binary_sensor"}'
        values: '172800+0x40'
    alert_rule_test:
      - eval_time: 20m
        alertname: HaEntityStale
        exp_alerts: []

  # STAGE-005-039 NO-FIRE: HaAutomationIdle is opt-in / commented out.
  # Input: last_triggered_seconds==2592000 (30d) held 20m — would trip any
  # blanket threshold rule (>86400 @24h, >604800 @7d, >2592000 @30d).
  # Expected: no alert (rule is not loaded).
  - interval: 30s
    input_series:
      - series: 'homelab_ha_automation_last_triggered_seconds{entity_id="automation.freeze_warning"}'
        values: '2592000+0x40'
    alert_rule_test:
      - eval_time: 20m
        alertname: HaAutomationIdle
        exp_alerts: []

  # STAGE-005-039 NO-FIRE: HaAutomationDisabled is opt-in / commented out.
  # Input: automation_enabled==0 held 20m — would trip a blanket `== 0` rule.
  # Expected: no alert (rule is not loaded).
  - interval: 30s
    input_series:
      - series: 'homelab_ha_automation_enabled{entity_id="automation.holiday_lights"}'
        values: '0+0x40'
    alert_rule_test:
      - eval_time: 20m
        alertname: HaAutomationDisabled
        exp_alerts: []
