# Rule unit-test fixtures for deploy/vmalert/metrics/host_anomalies.yaml.
# Schema: Prometheus / vmalert rule unit-test format.
# Run manually (vmalert has NO unit-test mode — use promtool, which understands the
# same Prometheus rule-test schema, for the threshold/division rules):
#   docker run --rm --entrypoint promtool \
#     -v $(pwd)/deploy/vmalert/metrics:/rules \
#     prom/prometheus:v2.47.0 \
#     test rules /rules/__tests__/host_anomalies.tests.yaml
# NOTE: promtool (Prometheus engine) CANNOT validate the inline rate-subquery anomaly rules
#   HostDiskIOAnomalous / HostNetThroughputAnomalous — those use a MetricsQL `rate(...)[w:s]`
#   subquery promtool does not evaluate, so their FIRE fixtures show `got:[]` under promtool by
#   design; they are validated by live-MetricsQL replay against the rig instead (Refinement 3b).
#   The load rules (HostHighLoad/HostCriticalLoad) ARE promtool-validatable because their exprs
#   use scalar(count(...)) — engine-portable to both PromQL and MetricsQL.
# (No make target wires this yet — forward-compatible static fixture, NOT CI-run.
#  Consistent with every other __tests__/*.tests.yaml in this directory.)
#
# ANNOTATION NOTE: summaries are static; several rules' `description` annotations embed
# {{ $value }}. Per the house convention (see home-assistant.tests.yaml), fire-cases whose
# rendered annotation carries {{ $value }} assert exp_labels ONLY and omit exp_annotations.
#
# LOAD RULE NOTE: HostHighLoad / HostCriticalLoad use count(cpu!="all") for core count.
# Tests plant 16 per-core series (cpu="0".."15") so count()=16, thresholds=32 and 64.
#
# ANOMALY RULE NOTE: Rules 8-11 use avg_over_time over a 6h window. Tests plant a
# 6h baseline stretch (720 samples at 30s) then a spike stretch, evaluating past
# the for:15m duration after spike onset (at 6h+16m = 376m).

rule_files:
  - ../host_anomalies.yaml

evaluation_interval: 30s

tests:

  # ===========================================================================
  # 1. HostCriticalCPU (for: 10m)
  # ===========================================================================

  # FIRE: CPU held above 95% for well over 10m.
  - interval: 30s
    input_series:
      - series: 'homelab_host_cpu_percent{cpu="all",host="homelab"}'
        values: '97+0x30'
    alert_rule_test:
      - eval_time: 11m
        alertname: HostCriticalCPU
        exp_alerts:
          - exp_labels:
              severity: critical
              source_tool: vmalert-metrics
              target_kind: host
              cpu: all
              host: homelab
            exp_annotations:
              summary: "Host CPU above 95% for 10m"
              description: "Host homelab CPU at 97% (avg over 5m, sustained 10m)"

  # NO-FIRE: CPU at 94% (below threshold).
  - interval: 30s
    input_series:
      - series: 'homelab_host_cpu_percent{cpu="all",host="homelab"}'
        values: '94+0x30'
    alert_rule_test:
      - eval_time: 11m
        alertname: HostCriticalCPU
        exp_alerts: []

  # ===========================================================================
  # 2. HostCriticalMemory (for: 10m)
  # ===========================================================================

  # FIRE: used/total > 0.95 for >10m. Use concrete byte values: 15.6GB used / 16GB total = 0.975.
  - interval: 30s
    input_series:
      - series: 'homelab_host_memory_bytes{type="used",host="homelab"}'
        values: '16750000000+0x30'
      - series: 'homelab_host_memory_bytes{type="total",host="homelab"}'
        values: '17179869184+0x30'
    alert_rule_test:
      - eval_time: 11m
        alertname: HostCriticalMemory
        exp_alerts:
          - exp_labels:
              severity: critical
              source_tool: vmalert-metrics
              target_kind: host
              host: homelab
            exp_annotations:
              summary: "Host memory above 95% for 10m"
              description: "Host homelab memory utilization 97.5%"

  # NO-FIRE: used/total = 0.20 (this host's idle baseline — 20% RAM used).
  - interval: 30s
    input_series:
      - series: 'homelab_host_memory_bytes{type="used",host="homelab"}'
        values: '3435973836+0x30'
      - series: 'homelab_host_memory_bytes{type="total",host="homelab"}'
        values: '17179869184+0x30'
    alert_rule_test:
      - eval_time: 11m
        alertname: HostCriticalMemory
        exp_alerts: []

