        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="4",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="5",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="6",host="homelab"}'
        values: '10+0x30'
