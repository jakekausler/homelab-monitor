  # ===========================================================================
  # 5. HostMemoryPressure (for: 10m) — AND gate: swap>0.5 AND mem>0.85
  # Use byte values. swap: 8GB total. mem: 16GB total (17179869184).
  # FIRE: swap 5GB/8GB = 0.625 > 0.5, mem 15GB/16GB = 0.937 > 0.85.
  # NO-FIRE A: swap high (0.6) but mem low (0.20) — this host's idle baseline.
  # NO-FIRE B: mem high (0.88) but swap low (0.10).
  # ===========================================================================

  # FIRE: both conditions true.
  - interval: 30s
    input_series:
      - series: 'homelab_host_swap_bytes{type="used",host="homelab"}'
        values: '5368709120+0x30'
      - series: 'homelab_host_swap_bytes{type="total",host="homelab"}'
        values: '8589934592+0x30'
      - series: 'homelab_host_memory_bytes{type="used",host="homelab"}'
        values: '16106127360+0x30'
      - series: 'homelab_host_memory_bytes{type="total",host="homelab"}'
        values: '17179869184+0x30'
    alert_rule_test:
      - eval_time: 11m
        alertname: HostMemoryPressure
        exp_alerts:
          - exp_labels:
              severity: warning
              source_tool: vmalert-metrics
              target_kind: host
              host: homelab
            exp_annotations:
              summary: "Host memory pressure: swap and RAM both elevated for 10m"
              description: "Host homelab swap >50% AND RAM >85% simultaneously for 10m"

  # NO-FIRE A: swap=0.625 > 0.5 but mem=0.20 < 0.85 (AND-gate fails).
  - interval: 30s
    input_series:
      - series: 'homelab_host_swap_bytes{type="used",host="homelab"}'
        values: '5368709120+0x30'
      - series: 'homelab_host_swap_bytes{type="total",host="homelab"}'
        values: '8589934592+0x30'
      - series: 'homelab_host_memory_bytes{type="used",host="homelab"}'
        values: '3435973836+0x30'
      - series: 'homelab_host_memory_bytes{type="total",host="homelab"}'
        values: '17179869184+0x30'
    alert_rule_test:
      - eval_time: 11m
        alertname: HostMemoryPressure
        exp_alerts: []

  # NO-FIRE B: mem=0.88 > 0.85 but swap=0.10 < 0.5 (AND-gate fails).
  - interval: 30s
    input_series:
      - series: 'homelab_host_swap_bytes{type="used",host="homelab"}'
        values: '858993459+0x30'
      - series: 'homelab_host_swap_bytes{type="total",host="homelab"}'
        values: '8589934592+0x30'
      - series: 'homelab_host_memory_bytes{type="used",host="homelab"}'
        values: '15118310400+0x30'
      - series: 'homelab_host_memory_bytes{type="total",host="homelab"}'
        values: '17179869184+0x30'
    alert_rule_test:
      - eval_time: 11m
        alertname: HostMemoryPressure
        exp_alerts: []

  # ===========================================================================
  # 6. HostZombieProcesses (for: 10m)
  # ===========================================================================

  # FIRE: 25 zombies for >10m.
  - interval: 30s
    input_series:
      - series: 'homelab_host_processes_total{state="zombie",host="homelab"}'
        values: '25+0x30'
    alert_rule_test:
      - eval_time: 11m
        alertname: HostZombieProcesses
        exp_alerts:
          - exp_labels:
              severity: warning
              source_tool: vmalert-metrics
              target_kind: host
              state: zombie
              host: homelab
            exp_annotations:
              summary: "Host zombie process count above 20 for 10m"
              description: "Host homelab has 25 zombie processes"

  # NO-FIRE: 15 zombies (below threshold).
  - interval: 30s
    input_series:
      - series: 'homelab_host_processes_total{state="zombie",host="homelab"}'
        values: '15+0x30'
    alert_rule_test:
      - eval_time: 11m
        alertname: HostZombieProcesses
        exp_alerts: []

  # ===========================================================================
  # 7. HostRecentlyRebooted (for: 0m)
  # ===========================================================================

  # FIRE: uptime=300s < 600s, fires immediately (for: 0m).
  - interval: 30s
    input_series:
      - series: 'homelab_host_uptime_seconds{host="homelab"}'
        values: '300+0x5'
    alert_rule_test:
      - eval_time: 30s
        alertname: HostRecentlyRebooted
        exp_alerts:
          - exp_labels:
              severity: info
              source_tool: vmalert-metrics
              target_kind: host
              host: homelab
            exp_annotations:
