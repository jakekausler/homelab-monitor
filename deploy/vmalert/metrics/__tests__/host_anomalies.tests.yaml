  # NO-FIRE: load=20 (≤ 32 threshold).
  - interval: 30s
    input_series:
      - series: 'homelab_host_cpu_percent{cpu="0",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="1",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="2",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="3",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="4",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="5",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="6",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="7",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="8",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="9",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="10",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="11",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="12",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="13",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="14",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_cpu_percent{cpu="15",host="homelab"}'
        values: '10+0x30'
      - series: 'homelab_host_load_average{period="15m",host="homelab"}'
        values: '20+0x30'
    alert_rule_test:
      - eval_time: 11m
        alertname: HostHighLoad
        exp_alerts: []

  # ===========================================================================
  # 4. HostCriticalLoad (for: 10m) — threshold: load > 4 * 16 = 64
  # ===========================================================================

  # FIRE: load=80 > 64.
  - interval: 30s
    input_series:
      - series: 'homelab_host_cpu_percent{cpu="0",host="homelab"}'
