              description: "Host homelab memory ratio 85% exceeds 2x its 6-hour baseline (floor 60%)"

  # NO-FIRE: flat at 20% — ratio=0.20 < 0.60 floor.
  - interval: 30s
    input_series:
      - series: 'homelab_host_memory_bytes{type="used",host="homelab"}'
        values: '3435973836+0x760'
      - series: 'homelab_host_memory_bytes{type="total",host="homelab"}'
        values: '17179869184+0x760'
    alert_rule_test:
      - eval_time: 376m
        alertname: HostMemoryAnomalous
        exp_alerts: []

  # ===========================================================================
  # 10. HostDiskIOAnomalous (for: 15m) — 3x 6h baseline, floor 52428800 (50 MB/s)
  # Metric: homelab_host_disk_io_bytes_total{direction,disk} (counter).
  # We plant a counter that increases at a constant rate, then jumps.
  # Baseline: 10 MB/s = 10485760 B/s. For a 5m rate window: increase of
  # 10485760 * 300 = 3145728000 per 5m period.
  # At 30s eval_interval, counter increments by 10485760*30 = 314572800 per step.
  # Baseline 720 steps: rate(5m) ≈ 10 MB/s.
  # Spike: 200 MB/s = 209715200 B/s per step increase = 6291456000 per step.
  # clamp_min(3 * 10MB/s, 50MB/s) = clamp_min(30MB/s, 50MB/s) = 50 MB/s.
  # 200 MB/s > 50 MB/s → FIRE.
  # NO-FIRE: flat 10 MB/s throughout (rate < 50 MB/s floor).
  # NOTE: Counter values expressed as cumulative totals; use incrementing series.
  # Using '+<step>x<N>' notation: start at 0, increment by delta each 30s step.
  # Baseline delta per 30s: 314572800. Spike delta: 6291456000.
  # ===========================================================================

  # FIRE: 10 MB/s baseline for 6h, then 200 MB/s for 16m.
  - interval: 30s
    input_series:
      - series: 'homelab_host_disk_io_bytes_total{direction="read",disk="sda",host="homelab"}'
        values: '0+314572800x720 226492416000+6291456000x32'
    alert_rule_test:
      - eval_time: 376m
        alertname: HostDiskIOAnomalous
        exp_alerts:
          - exp_labels:
              severity: info
              source_tool: vmalert-metrics
              target_kind: host
              direction: read
              disk: sda
              host: homelab
            exp_annotations:
              summary: "Host disk I/O anomalously high on sda (read)"

  # NO-FIRE: flat 10 MB/s throughout — rate stays below 50 MB/s floor.
  - interval: 30s
    input_series:
      - series: 'homelab_host_disk_io_bytes_total{direction="read",disk="sda",host="homelab"}'
        values: '0+314572800x760'
    alert_rule_test:
      - eval_time: 376m
        alertname: HostDiskIOAnomalous
        exp_alerts: []

  # ===========================================================================
  # 11. HostNetThroughputAnomalous (for: 15m) — 3x 6h baseline, floor 52428800 (50 MB/s)
  # Same counter-rate idiom as rule 10. iface!="lo" selector active.
  # Baseline: 10 MB/s on eth0. Spike: 200 MB/s.
  # Same delta math as rule 10.
  # ===========================================================================

  # FIRE: 10 MB/s baseline for 6h, then 200 MB/s for 16m on eth0.
  - interval: 30s
    input_series:
      - series: 'homelab_host_net_bytes_total{direction="rx",iface="eth0",host="homelab"}'
        values: '0+314572800x720 226492416000+6291456000x32'
    alert_rule_test:
      - eval_time: 376m
        alertname: HostNetThroughputAnomalous
        exp_alerts:
          - exp_labels:
              severity: info
              source_tool: vmalert-metrics
              target_kind: host
              direction: rx
              iface: eth0
              host: homelab
            exp_annotations:
              summary: "Host net throughput anomalously high on eth0 (rx)"

  # NO-FIRE loopback: lo traffic at 200 MB/s is excluded by iface!="lo" filter.
  - interval: 30s
    input_series:
      - series: 'homelab_host_net_bytes_total{direction="rx",iface="lo",host="homelab"}'
        values: '0+6291456000x760'
    alert_rule_test:
      - eval_time: 376m
        alertname: HostNetThroughputAnomalous
        exp_alerts: []

  # NO-FIRE: flat 10 MB/s on eth0 — below 50 MB/s floor.
  - interval: 30s
    input_series:
      - series: 'homelab_host_net_bytes_total{direction="rx",iface="eth0",host="homelab"}'
        values: '0+314572800x760'
    alert_rule_test:
      - eval_time: 376m
        alertname: HostNetThroughputAnomalous
        exp_alerts: []
