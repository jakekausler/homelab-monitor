              description: "Host homelab uptime is 300s (rebooted within the last 10 minutes)"

  # NO-FIRE: uptime=3600s > 600s.
  - interval: 30s
    input_series:
      - series: 'homelab_host_uptime_seconds{host="homelab"}'
        values: '3600+0x5'
    alert_rule_test:
      - eval_time: 30s
        alertname: HostRecentlyRebooted
        exp_alerts: []

  # ===========================================================================
  # 8. HostCPUAnomalous (for: 15m) — 3x 6h baseline, floor 40%
  # Baseline: 10% CPU for 6h (720 samples at 30s). Spike: 60% for 16m (32 samples).
  # clamp_min(3*10, 40) = clamp_min(30, 40) = 40. 60 > 40 → FIRE after 15m.
  # Eval at 6h+16m = 376m.
  # NO-FIRE: flat at 10% — 10 < 40 floor, never fires.
  # ===========================================================================

  # FIRE: 10% baseline for 6h, then 60% for 16m.
  - interval: 30s
    input_series:
      - series: 'homelab_host_cpu_percent{cpu="all",host="homelab"}'
        values: '10+0x720 60+0x32'
    alert_rule_test:
      - eval_time: 376m
        alertname: HostCPUAnomalous
        exp_alerts:
          - exp_labels:
              severity: info
              source_tool: vmalert-metrics
              target_kind: host
              cpu: all
              host: homelab
            exp_annotations:
              summary: "Host CPU anomalously high (3x 6h baseline, floor 40%)"
              description: "Host homelab CPU 60% exceeds 3x its 6-hour baseline (floor 40%)"

  # NO-FIRE: flat 10% — always below the 40% floor.
  - interval: 30s
    input_series:
      - series: 'homelab_host_cpu_percent{cpu="all",host="homelab"}'
        values: '10+0x760'
    alert_rule_test:
      - eval_time: 376m
        alertname: HostCPUAnomalous
        exp_alerts: []

  # ===========================================================================
  # 9. HostMemoryAnomalous (for: 15m) — 2x 6h baseline ratio, floor 0.6
  # Use byte values. total=16GB. Baseline: 20% used = 3.44GB for 6h.
  # Spike: 85% used = 14.6GB for 16m.
  # clamp_min(2*0.20, 0.6) = clamp_min(0.40, 0.6) = 0.6. 0.85 > 0.6 → FIRE.
  # NO-FIRE: flat at 20% — 0.20 < 0.6 floor.
  # ===========================================================================

  # FIRE: 20% baseline for 6h, then 85% for 16m.
  - interval: 30s
    input_series:
      - series: 'homelab_host_memory_bytes{type="used",host="homelab"}'
        values: '3435973836+0x720 14603400192+0x32'
      - series: 'homelab_host_memory_bytes{type="total",host="homelab"}'
        values: '17179869184+0x752'
    alert_rule_test:
      - eval_time: 376m
        alertname: HostMemoryAnomalous
        exp_alerts:
          - exp_labels:
              severity: info
              source_tool: vmalert-metrics
              target_kind: host
              host: homelab
            exp_annotations:
