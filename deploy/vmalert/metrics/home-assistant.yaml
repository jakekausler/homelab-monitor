# vmalert METRICS rules for Home Assistant (STAGE-005-015).
#
# This is the metric-STATE counterpart to STAGE-005-014's log-EVENT rules at
# deploy/vmalert/logs/home-assistant.yaml. Log rules (vmalert-logs) catch
# transient EVENTS in the log stream; these metric rules (vmalert-metrics) catch
# PERSISTENT STATE sampled from the HA collector gauges. Distinct alertnames AND
# distinct source_tool values (vmalert-metrics vs vmalert-logs) mean Alertmanager
# never dedup-collides the two families.
#
# All rules carry: severity / source_tool: vmalert-metrics / target_kind: container /
# integration: home_assistant (mirrors 014's logs-file label conventions, but with
# the metrics source_tool).
#
# Severity vocabulary locked: info / warning / error / critical (spec §8.2).
#
# DEFERRED — per-entity entity-availability alerting (design rule #1) AND
# device-down rollup (design rule #7): both are OPT-IN (commented) rather than
# active defaults. Root reason: without a per-entity "expected available" baseline,
# a blanket `entity_available == 0` rule fires on chronic integration/cloud noise.
# Measured on a real homelab during STAGE-005-015 Refinement 3b: ~50% of 1906 HA
# entities are chronically unavailable (Frigate-linked, smart-plug ancillary, Plex
# session players, cloud integrations); domain does NOT discriminate (sensor 52%,
# binary_sensor 69%, switch 41% chronic). Per-entity scoping belongs in the
# 005-005 user-rule machinery (deploy/vmalert/metrics-user/*.yaml). For rule #7:
# there is NO `device` label on HA metrics yet. A per-device rollup needs
# HA core.device_registry sourced via the WS API plus a CollectorContext change to
# attach a `device` label to entity series. That is a future EPIC-005 stage.
# HaUnreachable (#18, HA-itself-down) remains the only default-on availability
# signal. Both #1 and #7 await the device-availability facility or user scoping.
#
# Metric contracts (verified):
#   homelab_ha_up{}                                      1/0
#   homelab_ha_entity_available{entity_id,domain}        1/0
#   homelab_ha_entity_last_changed_seconds{entity_id,domain}
#   homelab_ha_battery_level{entity_id,domain}           0-100
#   homelab_ha_update_available{entity_id,title}         1/0
#   homelab_ha_automation_last_triggered_seconds{entity_id}
#   homelab_ha_automation_enabled{entity_id}             1/0
#   homelab_ha_config_entry_setup_error{domain,title}    1/0
#
# Test counterpart: deploy/vmalert/metrics/__tests__/home-assistant.tests.yaml
# (forward-compatible static fixture; see that file's header for the manual runner).

groups:
  - name: home_assistant_availability
    interval: 30s
    rules:
      - alert: HaUnreachable
        expr: homelab_ha_up == 0
        for: 2m
        labels:
          severity: critical
          source_tool: vmalert-metrics
          target_kind: container
          integration: home_assistant
        annotations:
          summary: "Home Assistant is unreachable"
          description: >-
            The Home Assistant API has been unreachable (homelab_ha_up=0) for at
            least 2 minutes. Entity state, automations, and updates cannot be
            collected until it recovers.
          explorer: '/integrations/home-assistant'

  - name: home_assistant_health
    interval: 30s
    rules:
      - alert: HaConfigEntryError
        expr: homelab_ha_config_entry_setup_error == 1
        for: 5m
        labels:
          severity: error
          source_tool: vmalert-metrics
          target_kind: container
          integration: home_assistant
        annotations:
          summary: "HA config entry in error: {{ $labels.title }} ({{ $labels.domain }})"
          description: >-
            Config entry {{ $labels.title }} (domain {{ $labels.domain }}) has been
            in a setup-error state for at least 5 minutes. This is the persistent-
            STATE counterpart to the HaIntegrationSetupFailure log EVENT
            (deploy/vmalert/logs/home-assistant.yaml): the log rule fires on any
            transient setup-failure line, whereas this fires only when the entry
            stays in error across scrapes. Distinct alertname + source_tool
            (vmalert-metrics) — no Alertmanager dedup collision with the log rule.
          explorer: '/integrations/home-assistant'

      - alert: HaBatteryCritical
        expr: homelab_ha_battery_level < 10
        for: 10m
        labels:
          severity: error
          source_tool: vmalert-metrics
          target_kind: container
          integration: home_assistant
        annotations:
          summary: "Battery critical: {{ $labels.entity_id }} ({{ $value }}%)"
          description: >-
            Battery entity {{ $labels.entity_id }} (domain {{ $labels.domain }}) is
            at {{ $value }}% — below the 10% critical threshold for at least 10
            minutes. Replace or recharge soon to avoid a dead sensor.
          explorer: '/integrations/home-assistant'

      - alert: HaBatteryLow
        expr: homelab_ha_battery_level >= 10 and homelab_ha_battery_level < 20
        for: 10m
        labels:
          severity: warning
          source_tool: vmalert-metrics
          target_kind: container
          integration: home_assistant
        annotations:
          summary: "Battery low: {{ $labels.entity_id }} ({{ $value }}%)"
          description: >-
            Battery entity {{ $labels.entity_id }} (domain {{ $labels.domain }}) is
            at {{ $value }}% — in the 10-20% low band for at least 10 minutes. The
            `>= 10 and < 20` band is deliberate: a battery below 10% fires only
            HaBatteryCritical (not both), so a single dying battery raises exactly
            one alert.
          explorer: '/integrations/home-assistant'

  - name: home_assistant_updates
    interval: 30s
    rules:
      - alert: HaUpdatesPending
        expr: count(homelab_ha_update_available == 1) > 0
        for: 15m
        labels:
          severity: info
          source_tool: vmalert-metrics
          target_kind: container
          integration: home_assistant
        annotations:
          summary: "{{ $value }} Home Assistant update(s) pending"
          description: >-
            {{ $value }} Home Assistant component/add-on/OS update(s) have been
            available for at least 15 minutes. Review and apply them from the Home
            Assistant integration panel. NOTE: count() collapses every matching
            series into a single value with an EMPTY label set, so this alert
            carries only the rule's own labels (no entity_id/title).
          explorer: '/integrations/home-assistant'

