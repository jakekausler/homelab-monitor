# vmalert rules for Docker image update availability.
# Emitted by ImageUpdateCollector (STAGE-003-008).
#
# Severity vocabulary locked: info / warning / error / critical (spec §8.2).
#
# `for: 30m` tolerates transient collector failures before alerting.

groups:
  - name: docker_image_updates
    interval: 30s
    rules:
      - alert: DockerImageUpdateAvailable
        expr: homelab_image_update_available == 1
        for: 30m
        labels:
          severity: info
          source_tool: vmalert-metrics
          target_kind: docker_container
          integration: docker
        annotations:
          summary: "Container {{ $labels.name }} has an image update available"
          description: 'Docker container {{ $labels.name }} (image {{ $labels.image }}) has a newer digest available in the registry. Current: {{ $labels.current_digest }}. Latest: {{ $labels.latest_digest }}.'
