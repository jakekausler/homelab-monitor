# vmalert METRICS rules for the Synology / rackstation NAS integration (STAGE-008-019 / EPIC-008).
# Picked up by the vmalert-metrics sidecar (-rule=/etc/vmalert/metrics/*.yaml).
# Severity vocabulary locked: info / warning / critical ONLY (spec §8.2; no 'error').
#
# This file builds the WHOLE rackstation-mount -> docker-container inhibit chain so it is
# golden-testable end-to-end:
#   * SynologyMountDown  — SOURCE alert. Fires when a probed host NFS mount from the Synology
#                          NAS is unresponsive (homelab_synology_mount_up == 0). Carries the
#                          per-mount `mount` label (flows through from the metric automatically).
#   * PlexContainerDown / PodcastFeedContainerDown — TARGET alerts. Both carry
#                          depends_on_rackstation="true", the label Alertmanager's inhibit_rules
#                          block keys on to suppress them while SynologyMountDown is firing.
#
# Label convention:
#   SynologyMountDown      — integration style: severity / source_tool: vmalert-metrics /
#                            category: storage / integration: synology.
#   *ContainerDown         — integration + host-platform style: adds target_kind: docker_container,
#                            integration: docker, and the inhibit matcher depends_on_rackstation="true".
#
# Metric families consumed:
#   homelab_synology_mount_up   — 1.0 responsive, 0.0 missing/hung/error. ALWAYS SEEDED to 0.0 first
#                                 (collector seed-then-overwrite idiom), so the series never goes
#                                 absent and a plain `== 0` threshold is the correct firing condition.
#                                 One series per `mount` label.
#   homelab_container_status    — per-container state series (name/id/state labels), shared with the
#                                 container_crash / pihole rule families.
#
# Annotations: summary is a static single line; description is a `>-` block referencing the relevant
# label(s) via {{ $labels.X }}.
#
# Inhibition: the matching Alertmanager rule lives in deploy/alertmanager/alertmanager.yml.template
# (source_matchers alertname="SynologyMountDown" -> target_matchers depends_on_rackstation="true",
# NO equal:). See that file's comment block for why no equal:.
#
# Unit tests: deploy/vmalert/metrics/__tests__/synology.tests.yaml. All 3 rules are
# promtool-validatable. Run with promtool:
#   docker run --rm --entrypoint promtool \
#     -v $(pwd)/deploy/vmalert/metrics:/rules \
#     prom/prometheus:v2.47.0 \
#     test rules /rules/__tests__/synology.tests.yaml
#
# ── STAGE-008-021 (core storage/hardware/system rules) — DELIBERATE NO-DUPLICATION ──────────────
# This file gained 3 themed groups (synology_storage / synology_hardware / synology_system) in
# STAGE-008-021. Two card-listed deliverables are SATISFIED-BY-REUSE and are intentionally NOT
# re-authored here (re-authoring would DOUBLE-FIRE):
#
#   * SSH rules (SynologySshHostKeyMismatch / SynologySshProbeStale): EPIC-017's
#     deploy/vmalert/metrics/ssh.yaml already has GENERIC, target-agnostic rules
#     SshHostKeyMismatch (critical), SshProbeStale (warning), and SshTargetUnreachable
#     (warning) with NO target filter. They ALREADY fire for the Synology SSH probe
#     (target="synology") via homelab_ssh_*{target}. Authoring synology-scoped duplicates
#     would double-fire. → Reuse ssh.yaml. No synology-scoped SSH rule here.
#
#   * Reachability / "DSM unreachable / collector dead": deploy/vmalert/metrics/collector_health.yaml
#     already covers the synology collectors via collector_silent_death (critical) and
#     collector_failure_rate_elevated (warning) — the synology collectors are NOT in those rules'
#     exclusion lists. So total unreachability / collector death is already covered.
#     SynologyDown below fires on the DSM SystemHealth aggregate (homelab_synology_health_ok == 0),
#     a DSM-health PROBLEM signal — NOT total unreachability. For total unreachability, see
#     collector_silent_death in collector_health.yaml.

groups:
  - name: synology
    interval: 30s
    rules:
      # 1 — A probed host NFS mount from the Synology NAS is unresponsive. SOURCE alert for the
      # rackstation-mount -> dependent-container inhibition. The `mount` label is preserved from
      # the metric and names the specific mount point.
      - alert: SynologyMountDown
        expr: homelab_synology_mount_up == 0
        for: 2m
        labels:
          severity: critical
          source_tool: vmalert-metrics
          category: storage
          integration: synology
        annotations:
          summary: "Synology NAS mount is down"
          description: >-
            The Synology NAS mount {{ $labels.mount }} is unresponsive
            (homelab_synology_mount_up=0). Containers that depend on rackstation storage are at risk.

  - name: synology_dependents
    interval: 30s
    rules:
      # 2 — plex container not running. absent(running) OR a dead/exited/restarting state.
      # Carries depends_on_rackstation="true" so SynologyMountDown inhibits it (plex mounts many
      # rackstation shares; a NAS-layer outage realistically takes plex down with it).
      - alert: PlexContainerDown
        expr: >-
          absent(homelab_container_status{name="plex",state="running"})
          or homelab_container_status{name="plex",state=~"exited|dead|restarting"} == 1
        for: 2m
        labels:
          severity: critical
          source_tool: vmalert-metrics
          target_kind: docker_container
          integration: docker
          depends_on_rackstation: "true"
        annotations:
          summary: "plex container is not running"
          description: >-
            The plex container is not in a running state (no running series, or state
            {{ $labels.state }}). Media streaming is down until the container recovers.

      # 3 — podcast-feed container not running. Same shape as PlexContainerDown.
      - alert: PodcastFeedContainerDown
        expr: >-
          absent(homelab_container_status{name="podcast-feed",state="running"})
          or homelab_container_status{name="podcast-feed",state=~"exited|dead|restarting"} == 1
        for: 2m
        labels:
          severity: critical
          source_tool: vmalert-metrics
          target_kind: docker_container
          integration: docker
          depends_on_rackstation: "true"
        annotations:
          summary: "podcast-feed container is not running"
          description: >-
            The podcast-feed container is not in a running state (no running series, or state
            {{ $labels.state }}). Podcast feed generation is down until the container recovers.

  # ==================== STAGE-008-021 groups ====================

  - name: synology_storage
    interval: 30s
    rules:
      # 4 — A volume is filling up (advisory). The `volume` label flows through from the metric.
      - alert: SynologyVolumeNearFull
        expr: homelab_synology_volume_used_percent >= 80
        for: 15m
        labels:
          severity: info
          source_tool: vmalert-metrics
          category: storage
          integration: synology
        annotations:
          summary: "Synology volume is filling up (>=80%)"
          description: >-
            Synology volume {{ $labels.volume }} is at or above 80% used
            (homelab_synology_volume_used_percent). Plan cleanup or expansion before it fills.

      # 5 — A volume is nearly full (warning).
      - alert: SynologyVolumeAlmostFull
        expr: homelab_synology_volume_used_percent >= 90
        for: 10m
        labels:
          severity: warning
          source_tool: vmalert-metrics
          category: storage
          integration: synology
        annotations:
          summary: "Synology volume is nearly full (>=90%)"
          description: >-
            Synology volume {{ $labels.volume }} is at or above 90% used
            (homelab_synology_volume_used_percent). Free space urgently — a full volume risks data loss
            and service failures.

      # 6 — A volume is read-only / not writable (DSM boolean; 1=writable, 0=not). critical.
      - alert: SynologyVolumeDegraded
        expr: homelab_synology_volume_writable == 0
        for: 2m
        labels:
          severity: critical
          source_tool: vmalert-metrics
          category: storage
          integration: synology
        annotations:
          summary: "Synology volume is not writable (degraded)"
          description: >-
            Synology volume {{ $labels.volume }} is not writable (homelab_synology_volume_writable=0).
            The volume is degraded or read-only; writes are failing.

      # 7 — A storage pool's RAID is degraded (DSM boolean; 1=normal, 0=degraded). critical.
      - alert: SynologyPoolDegraded
        expr: homelab_synology_raid_status == 0
        for: 2m
        labels:
          severity: critical
          source_tool: vmalert-metrics
          category: storage
          integration: synology
        annotations:
          summary: "Synology storage pool RAID is degraded"
          description: >-
            Synology pool {{ $labels.pool }} RAID {{ $labels.raid }} is degraded
            (homelab_synology_raid_status=0). Redundancy is reduced or lost — replace the failed
            member promptly.

      # 8 — A pool has an unverified disk awaiting verification (advisory; always-seeded boolean).
      - alert: SynologyUnverifiedDisk
        expr: homelab_synology_pool_unverified_disk == 1
        for: 5m
        labels:
          severity: info
          source_tool: vmalert-metrics
          category: storage
          integration: synology
        annotations:
          summary: "Synology pool has an unverified disk"
          description: >-
            Synology pool {{ $labels.pool }} has an unverified disk
            (homelab_synology_pool_unverified_disk=1). DSM is waiting to verify a recently
            added/replaced disk.

      # 9 — A pool's last data-scrub was >90 days ago (7776000s). Age vs time() — no TZ math.
      # Guard ts>0: DSM reports 0 as "never scrubbed / unknown" sentinel; time()-0 ≈ 1.78B seconds
      # which would always false-fire. Only alert when there is a real, dated scrub timestamp.
      - alert: SynologyScrubOverdue
        expr: >-
          homelab_synology_pool_scrub_last_done_timestamp > 0
          and (time() - homelab_synology_pool_scrub_last_done_timestamp) > 7776000
        for: 0m
        labels:
          severity: warning
          source_tool: vmalert-metrics
          category: storage
          integration: synology
        annotations:
          summary: "Synology pool data-scrub is overdue (>90 days)"
          description: >-
            Synology pool {{ $labels.pool }} has not completed a data-scrub in over 90 days
            (7776000s). Run a data-scrub so latent disk errors are caught before they compound.

      # 10 — Data-integrity proxy: the pool has a failed disk, making scrub/parity untrustworthy.
      # NOTE: the real DSM scrub error-state enum string is UNCONFIRMED (only "ready" seen). This rule
      # ships the CONFIRMED proxy homelab_synology_pool_disk_failure_number > 0 (a real metric: the pool
      # has a failed disk). RE-VERIFY at Refinement: if a stable scrub error-state string exists, ADD a
      # secondary state-set rule alongside this proxy (tracked as a 021 regression item).
      - alert: SynologyScrubError
        expr: homelab_synology_pool_disk_failure_number > 0
        for: 0m
        labels:
          severity: warning
          source_tool: vmalert-metrics
          category: storage
          integration: synology
        annotations:
          summary: "Synology pool has a failed disk (data-integrity risk)"
          description: >-
            Synology pool {{ $labels.pool }} reports a failed disk
            (homelab_synology_pool_disk_failure_number > 0). Parity/scrub integrity is compromised
            until the disk is replaced and the pool rebuilds.

  - name: synology_hardware
    interval: 30s
    rules:
      # 11 — A disk has failed: DSM disk status bad, OR SMART status bad, OR a failing SMART attribute.
      # LABEL SEMANTICS: this is `A or B or C`. All three operands carry the {disk} label
      # (disk_status{disk}, disk_smart_status{disk}, smart_attr_failing{disk}). `or` is a set-union
      # that keeps the LEFT operand's series and adds right-operand series whose label set isn't already
      # present. A planted disk_status{disk="sda"}==0 matches ONLY operand A → ONE alert carrying
      # {disk="sda"}. The description references {{ $labels.disk }}, which every matching operand carries.
      # (disk_temp_celsius is {disk,model} — but it is NOT in this expr, so its extra `model` label is
      # irrelevant here.)
      - alert: SynologyDiskFailed
        expr: >-
          homelab_synology_disk_status == 0
          or homelab_synology_disk_smart_status == 0
          or homelab_synology_smart_attr_failing > 0
        for: 5m
        labels:
          severity: critical
          source_tool: vmalert-metrics
          category: hardware
          integration: synology
        annotations:
          summary: "Synology disk has failed or is failing SMART"
          description: >-
            Synology disk {{ $labels.disk }} has failed: DSM disk status bad, SMART status bad, or a
            failing SMART attribute. Replace the disk and verify pool/volume health.

      # 12 — A disk is running hot. 55C is a FIRST-PASS threshold — tune at Refinement against real
      # readings. The `model` label flows through alongside `disk` (metric is {disk,model}).
      - alert: SynologyDiskHighTemp
        expr: homelab_synology_disk_temp_celsius >= 55
        for: 10m
        labels:
          severity: warning
          source_tool: vmalert-metrics
          category: hardware
          integration: synology
        annotations:
          summary: "Synology disk temperature is high (>=55C)"
          description: >-
            Synology disk {{ $labels.disk }} ({{ $labels.model }}) is at or above 55C
            (homelab_synology_disk_temp_celsius). Check NAS airflow/ambient temperature.

      # 13 — The UPS is running on battery (mains power lost). No labels on the metric.
      - alert: SynologyUpsOnBattery
        expr: homelab_synology_ups_on_battery == 1
        for: 0m
        labels:
          severity: critical
          source_tool: vmalert-metrics
          category: hardware
          integration: synology
        annotations:
          summary: "Synology UPS is on battery (mains power lost)"
          description: >-
            The Synology UPS is running on battery (homelab_synology_ups_on_battery=1). Mains power has
            been lost; the NAS will shut down when the battery is exhausted.

      # 14 — The UPS battery is low (imminent shutdown). No labels on the metric.
      - alert: SynologyUpsLowBattery
        expr: homelab_synology_ups_low_battery == 1
        for: 0m
        labels:
          severity: critical
          source_tool: vmalert-metrics
          category: hardware
          integration: synology
        annotations:
          summary: "Synology UPS battery is low (imminent shutdown)"
          description: >-
            The Synology UPS battery is low (homelab_synology_ups_low_battery=1). Shutdown is imminent;
            ensure dependent services flush state.

  - name: synology_system
    interval: 30s
    rules:
      # 15 — DSM SystemHealth aggregate reports a problem (always-seeded; 1=healthy, 0=problem).
      # NOT total unreachability — for that see collector_silent_death in collector_health.yaml.
      - alert: SynologyDown
        expr: homelab_synology_health_ok == 0
        for: 5m
        labels:
          severity: critical
          source_tool: vmalert-metrics
          category: system
          integration: synology
        annotations:
          summary: "Synology DSM reports a system-health problem"
          description: >-
            Synology DSM SystemHealth reports a problem (homelab_synology_health_ok=0). Check DSM's
            System Health / notifications. NOTE: this is a DSM-health problem, not total unreachability —
            for a fully unreachable / dead collector, see collector_silent_death in collector_health.yaml.

      # 16 — DSM reports a system-temperature warning (DSM-provided boolean; no raw threshold).
      - alert: SynologySysHighTemp
        expr: homelab_synology_sys_temp_warning == 1
        for: 5m
        labels:
          severity: warning
          source_tool: vmalert-metrics
          category: system
          integration: synology
        annotations:
          summary: "Synology system temperature warning"
          description: >-
            Synology DSM reports a system-temperature warning (homelab_synology_sys_temp_warning=1).
            Check NAS airflow and ambient temperature.

      # 17 — CPU or memory pinned high. cpu_user/cpu_system/mem_usage are no-label scalars, so `+` of
      # the two cpu series and `or` with mem all collapse to a single (label-less) result → at most one
      # alert, no flow-through labels. 90% thresholds are FIRST-PASS — tune at Refinement.
      - alert: SynologyHighCpuMem
        expr: >-
          (homelab_synology_cpu_user_percent + homelab_synology_cpu_system_percent) > 90
          or homelab_synology_mem_usage_percent > 90
        for: 15m
        labels:
          severity: warning
          source_tool: vmalert-metrics
          category: system
          integration: synology
        annotations:
          summary: "Synology CPU or memory usage is high (>90%)"
          description: >-
            Synology CPU (user+system) or memory usage is above 90% (homelab_synology_cpu_*_percent /
            homelab_synology_mem_usage_percent). The NAS may be under heavy load or memory pressure.

      # 18 — DSM requests a reboot (e.g. after an update). No labels on the metric.
      - alert: SynologyNeedReboot
        expr: homelab_synology_need_reboot == 1
        for: 0m
        labels:
          severity: warning
          source_tool: vmalert-metrics
          category: system
          integration: synology
        annotations:
          summary: "Synology requests a reboot"
          description: >-
            Synology DSM is requesting a reboot (homelab_synology_need_reboot=1). A pending update or
            config change needs a reboot to take effect.

      # 19 — DSM API responses are slow. Per-api granularity so the alert names the slow endpoint.
      # SYNO.Storage.CGI.Storage/* is characteristically ~3.7s on a healthy NAS — excluded to avoid
      # persistent info noise. The {api} label flows through from the metric.
      - alert: SynologyApiSlow
        expr: homelab_synology_api_took_seconds{api!~"SYNO\\.Storage\\.CGI\\.Storage/.*"} > 2
        for: 10m
        labels:
          severity: info
          source_tool: vmalert-metrics
          category: system
          integration: synology
        annotations:
          summary: "Synology DSM API response time elevated"
          description: >-
            Synology DSM API {{ $labels.api }} response time is over 2s
            (homelab_synology_api_took_seconds). The DSM API is slow to respond, which may delay metric
            collection.

  # ==================== STAGE-008-022 groups ====================
  # Protect (backup), updates (DSM + package), security advisor. Surveillance Station rules live in
  # the dedicated deploy/vmalert/metrics/synology-surveillance.yaml file (separate concern, separate
  # group). Label convention unchanged: severity / source_tool: vmalert-metrics / category / integration.

  - name: synology_protect
    interval: 30s
    rules:
      # 20 — A backup job's last run failed (always-seeded boolean; 1=ok, 0=failed). The `job` label
      # flows through from the metric and names the specific backup task.
      - alert: SynologyBackupFailed
        expr: homelab_synology_backup_last_result_ok == 0
        for: 5m
        labels:
          severity: critical
          source_tool: vmalert-metrics
          category: protect
          integration: synology
        annotations:
          summary: "Synology backup job failed"
          description: >-
            Synology backup job {{ $labels.job }} last completed with a failure
            (homelab_synology_backup_last_result_ok=0). Check Hyper Backup / the backup task and re-run.

      # 21 — No backup task is configured on the NAS at all (standing advisory). Bare scalar metric
      # (no labels) → label-less advisory alert.
      - alert: SynologyNoBackupConfigured
        expr: homelab_synology_no_backup_configured == 1
        for: 15m
        labels:
          severity: info
          source_tool: vmalert-metrics
          category: protect
          integration: synology
        annotations:
          summary: "Synology has no backup task configured"
          description: >-
            The Synology NAS has no backup task configured
            (homelab_synology_no_backup_configured=1). Configure Hyper Backup so NAS data is protected.

  - name: synology_updates
    interval: 30s
    rules:
      # 22 — A non-security DSM update is available (advisory). The `and ... is_security==0` guard makes
      # this MUTUALLY EXCLUSIVE with the security-update rule below. Both operands are bare scalars, so
      # the `and` matches directly and the result is a label-less series.
      - alert: SynologyUpdateAvailable
        expr: homelab_synology_dsm_update_available == 1 and homelab_synology_dsm_update_is_security == 0
        for: 0m
        labels:
          severity: info
          source_tool: vmalert-metrics
          category: system
          integration: synology
        annotations:
          summary: "Synology DSM update available"
          description: >-
            A non-security DSM update is available (homelab_synology_dsm_update_available=1,
            homelab_synology_dsm_update_is_security=0). Plan a maintenance window to apply it.

      # 23 — A SECURITY DSM update is available (a problem, not just advisory). Mutually exclusive with
      # rule 22 via the is_security==1 guard. Bare-scalar `and` → label-less series.
      - alert: SynologyDsmSecurityUpdateAvailable
        expr: homelab_synology_dsm_update_available == 1 and homelab_synology_dsm_update_is_security == 1
        for: 0m
        labels:
          severity: warning
          source_tool: vmalert-metrics
          category: system
          integration: synology
        annotations:
          summary: "Synology DSM security update available"
          description: >-
            A security DSM update is available (homelab_synology_dsm_update_available=1,
            homelab_synology_dsm_update_is_security=1). Apply the security patch promptly.

      # 24 — At least one package has an update available (rollup advisory). count(...) strips ALL labels,
      # so the result is a single bare scalar series with NO per-package labels. (Do NOT use the buggy
      # packages_with_updates_count metric.)
      - alert: SynologyPackageUpdateAvailable
        expr: count(homelab_synology_package_update_available == 1) > 0
        for: 0m
        labels:
          severity: info
          source_tool: vmalert-metrics
          category: system
          integration: synology
        annotations:
          summary: "Synology package updates available"
          description: >-
            One or more Synology packages have updates available
            (homelab_synology_package_update_available). Review Package Center and update when convenient.

  - name: synology_security
    interval: 30s
    rules:
      # 25 — DSM Security Advisor reports a not-safe state (always-seeded boolean; 1=safe, 0=not-safe).
      # Bare scalar metric → label-less advisory alert.
      - alert: SynologySecurityAdvisorNotSafe
        expr: homelab_synology_security_safe == 0
        for: 10m
        labels:
          severity: info
          source_tool: vmalert-metrics
          category: security
          integration: synology
        annotations:
          summary: "Synology Security Advisor reports not-safe"
          description: >-
            The Synology DSM Security Advisor reports a not-safe state
            (homelab_synology_security_safe=0). Open Security Advisor and address the flagged items.
