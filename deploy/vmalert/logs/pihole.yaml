# vmalert-logs rules: Pi-hole / unbound (FTL) log-derived alerts via LogsQL.
#
# (a) All rules query service:="pihole-unbound" — the exact vector label value
#     for the Pi-hole/unbound container (confirm via `vector` config or a live VL
#     query if the label ever differs).
#
# (b) INFERRED-PHRASING CAVEAT: 3 of the 4 phrase sets (rate-limit, gravity-fail,
#     DB-anomaly) are INFERRED from the documented FTL log format, not observed
#     from a live-induced failure. Inducing real gravity-update / DB failures on
#     the LIVE Pi-hole is destructive (it serves real DNS), so these rules are
#     validated at Refinement 3a via PLANTED log lines (the integration test in
#     apps/monitor/tests/integration/test_vmalert_pihole_logs_pipeline.py), NOT
#     by inducing real failures. Re-tune phrases if live FTL output differs.
#
# (c) PiholeFtlError matches the bare token "ERROR:" — broad by design (FTL/dnsmasq/unbound
#     co-host this container). Validated silent at the live baseline (3b: 0 "ERROR:" lines/1h);
#     revisit the phrase if benign upstream "ERROR:" lines ever appear.
#
# (e) GRAVITY-BASELINE TRAP: the recurring FTL warning
#     "was inaccessible during last gravity run" is steady-state BASELINE noise on
#     this host — two permanently-dead NRD blocklists emit it on every gravity
#     run. PiholeGravityUpdateFailedLog deliberately does NOT match that phrase
#     (its phrases are disjoint from it AND from the success line
#     "Gravity database has been updated"). Likewise PiholeDbMaintenanceAnomaly
#     does NOT match the routine success line "Optimized database in X seconds".
#
# Test counterpart: deploy/vmalert/logs-test/pihole.yaml (shorter
# windows/intervals/thresholds for integration tests). Production windows are
# 5m; test windows are 30s.

groups:
  - name: pihole_logs
    type: vlogs
    interval: 30s
    rules:
      - alert: PiholeFtlRateLimit
        expr: '_time:5m service:="pihole-unbound" "Rate-limiting" | stats by (host) count() as ratelimit_count | filter ratelimit_count:>0'
        for: 2m
        labels:
          severity: warning
          source_tool: vmalert-logs
          target_kind: container
          integration: pihole
        annotations:
          summary: "Pi-hole FTL rate-limiting on {{ $labels.host }}"
          description: '{{ $value }} FTL rate-limiting log line(s) in 5m on {{ $labels.host }} (a client exceeded the per-client query rate limit)'
          explorer: '/logs?logsql=service:"pihole-unbound" AND "Rate-limiting"'

      - alert: PiholeFtlError
        expr: '_time:5m service:="pihole-unbound" "ERROR:" | stats by (host) count() as error_count | filter error_count:>0'
        for: 2m
        labels:
          severity: warning
          source_tool: vmalert-logs
          target_kind: container
          integration: pihole
        annotations:
          summary: "Pi-hole FTL error on {{ $labels.host }}"
          description: '{{ $value }} FTL ERROR log line(s) in 5m on {{ $labels.host }}'
          explorer: '/logs?logsql=service:"pihole-unbound" AND "ERROR:"'

      - alert: PiholeGravityUpdateFailedLog
        expr: '_time:5m service:="pihole-unbound" ("Unable to update gravity" OR "Error: Unable to update gravity database" OR "gravity failed") | stats by (host) count() as gravity_fail_count | filter gravity_fail_count:>0'
        for: 0m
        labels:
          severity: warning
          source_tool: vmalert-logs
          target_kind: container
          integration: pihole
        annotations:
          summary: "Pi-hole gravity update failed on {{ $labels.host }}"
          description: '{{ $value }} gravity-update failure log line(s) in 5m on {{ $labels.host }} (does NOT match the steady-state "inaccessible during last gravity run" baseline)'
          explorer: '/logs?logsql=service:"pihole-unbound" AND ("Unable to update gravity" OR "Error: Unable to update gravity database" OR "gravity failed")'

      - alert: PiholeDbMaintenanceAnomaly
        expr: '_time:5m service:="pihole-unbound" ("database is locked" OR "disk I/O error" OR "unable to open database" OR "Failed to optimize" OR "SQLITE_") | stats by (host) count() as db_anomaly_count | filter db_anomaly_count:>0'
        for: 0m
        labels:
          severity: info
          source_tool: vmalert-logs
          target_kind: container
          integration: pihole
        annotations:
          summary: "Pi-hole DB maintenance anomaly on {{ $labels.host }}"
          description: '{{ $value }} FTL DB-anomaly log line(s) in 5m on {{ $labels.host }} (lock / I/O / open / optimize / SQLITE errors; does NOT match the routine "Optimized database in X seconds" success line)'
          explorer: '/logs?logsql=service:"pihole-unbound" AND ("database is locked" OR "disk I/O error" OR "unable to open database" OR "Failed to optimize" OR "SQLITE_")'
