# vmalert-logs rules: Home Assistant log-derived alerts via LogsQL.
#
# (a) All rules query service:="homeassistant" — the exact vector label value
#     for the HA container (no hyphen; confirm via `vector` config or live VL
#     query if the label ever differs).
#
# (b) ANSI color codes: HA logs wrap ERROR lines with escape sequences but the
#     inner message substring is preserved. Rules match the stable substring
#     (e.g., "Error while executing automation"), NOT anchored to line start.
#     Free-text LogsQL substring matching is position-insensitive by design.
#
# (c) EVENT vs STATE relationship:
#     - HaIntegrationSetupFailure (this file) catches the setup-failure EVENT,
#       including transient ConfigEntryNotReady retries. It fires immediately on
#       any matching log line.
#     - STAGE-005-015's metric rule over homelab_ha_config_entry_setup_error
#       catches the PERSISTENT STATE (the collector emits 1.0 only when the
#       entry remains in error between scrapes). Distinct alertname AND distinct
#       source_tool (vmalert-logs vs vmalert-metrics) — no Alertmanager dedup
#       collision.
#
# (d) HaErrorRateSpike is a coarse FIXED-threshold safety net (N=50, tuned at 3b).
#     LogsQL cannot express relative-to-baseline comparisons. The TRUE baseline-
#     aware rule lives in deploy/vmalert/metrics/error_rate_spike.yaml (alert:
#     ServiceErrorRateSpike, using homelab_container_error_rate with a 5x 7-day
#     rolling baseline + 10-floor). N=50 is tuned at Refinement 3b (real HA baseline
#     ~18-22 errors/5m, 2.5x headroom).
#
# Test counterpart: deploy/vmalert/logs-test/home-assistant.yaml (shorter
# windows/intervals/thresholds for integration tests). Production windows are
# 5m; test windows are 30s.

groups:
  - name: home_assistant_logs
    type: vlogs
    interval: 30s
    rules:
      - alert: HaAutomationScriptFailure
        expr: '_time:5m service:="homeassistant" ("Error while executing automation" OR "Error executing script") | stats by (host) count() as fail_count | filter fail_count:>0'
        for: 0m
        labels:
          severity: error
          source_tool: vmalert-logs
          target_kind: container
          integration: home_assistant
        annotations:
          summary: "HA automation/script error on {{ $labels.host }}"
          description: '{{ $value }} automation or script failure(s) in 5m on {{ $labels.host }}'
          explorer: '/logs?logsql=service:"homeassistant" AND ("Error while executing automation" OR "Error executing script")'

      - alert: HaIntegrationSetupFailure
        expr: '_time:5m service:="homeassistant" ("Error during setup of component" OR "ConfigEntryNotReady") | stats by (host) count() as setup_fail_count | filter setup_fail_count:>0'
        for: 0m
        labels:
          severity: error
          source_tool: vmalert-logs
          target_kind: container
          integration: home_assistant
        annotations:
          summary: "HA integration setup failure on {{ $labels.host }}"
          description: '{{ $value }} integration setup failure(s) in 5m on {{ $labels.host }} (ConfigEntryNotReady or component setup error)'
          explorer: '/logs?logsql=service:"homeassistant" AND ("Error during setup of component" OR "ConfigEntryNotReady")'

      - alert: HaErrorRateSpike
        expr: '_time:5m service:="homeassistant" severity:error | stats by (host) count() as error_count | filter error_count:>50'
        for: 10m
        labels:
          severity: warning
          source_tool: vmalert-logs
          target_kind: container
          integration: home_assistant
        annotations:
          summary: "HA error-rate spike on {{ $labels.host }}"
          description: '{{ $value }} error-severity log lines in 5m on {{ $labels.host }} (fixed threshold N=50, tuned at Refinement 3b: measured real HA baseline ~18-22 errors/5m, 2.5x headroom). This is a coarse safety-net floor; the baseline-aware rule is ServiceErrorRateSpike in deploy/vmalert/metrics/error_rate_spike.yaml.'
          explorer: '/logs?logsql=service:"homeassistant" AND severity:error'
