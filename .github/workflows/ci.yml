name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --directory apps/monitor --all-extras

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

      - name: Type check
        run: make typecheck

      - name: Test (with coverage)
        run: make test

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate UI types from OpenAPI schema
        run: pnpm --filter ui run generate-types

      - name: Lint
        run: pnpm --filter ui run lint

      - name: Format check
        run: pnpm --filter ui run format-check

      - name: Type check
        run: pnpm --filter ui run typecheck

      - name: Test (with coverage)
        run: pnpm --filter ui run test

      - name: Build
        run: pnpm --filter ui run build

  crg-build:
    name: crg-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: astral-sh/setup-uv@v7
        with:
          python-version-file: .python-version

      - name: Install code-review-graph
        run: uv tool install 'code-review-graph>=1.2,<2.0'

      - name: Build graph
        run: uv tool run code-review-graph build

      - name: Upload graph artifact
        uses: actions/upload-artifact@v7
        with:
          name: crg-graph
          path: .code-review-graph/
          retention-days: 7

  integration:
    name: integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate UI types (required before build)
        run: pnpm --filter ui run generate-types

      - name: Build UI bundle (required by prod Dockerfile)
        run: pnpm --filter ui run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Log in to GHCR to avoid rate-limits on public GHCR images
      # (karma, kthxbye) and to pull the custom Grafana image once
      # grafana-image.yml has published it. On the very first CI run
      # the Grafana image won't exist in GHCR yet; docker compose build
      # builds it locally from deploy/grafana/Dockerfile instead.
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pre-warm BuildKit GHA layer cache for each locally-built image.
      # docker compose --build re-uses the warmed layers automatically
      # when DOCKER_BUILDKIT=1 and Buildx is active.
      - name: Restore/export BuildKit cache — monitor (prod image)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/monitor/Dockerfile
          push: false
          load: false
          cache-from: type=gha,scope=integration-monitor
          cache-to: type=gha,scope=integration-monitor,mode=max

      - name: Restore/export BuildKit cache — integration-tests
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/monitor/Dockerfile.test
          push: false
          load: false
          cache-from: type=gha,scope=integration-tests
          cache-to: type=gha,scope=integration-tests,mode=max

      - name: Restore/export BuildKit cache — fixture-host
        uses: docker/build-push-action@v7
        with:
          context: apps/monitor/tests/fixtures/fixture-host
          file: apps/monitor/tests/fixtures/fixture-host/Dockerfile
          push: false
          load: false
          cache-from: type=gha,scope=integration-fixture-host
          cache-to: type=gha,scope=integration-fixture-host,mode=max

      - name: Restore/export BuildKit cache — noisy-logger
        uses: docker/build-push-action@v7
        with:
          context: apps/monitor/tests/fixtures/noisy-logger
          file: apps/monitor/tests/fixtures/noisy-logger/Dockerfile
          push: false
          load: false
          cache-from: type=gha,scope=integration-noisy-logger
          cache-to: type=gha,scope=integration-noisy-logger,mode=max

      - name: Restore/export BuildKit cache — grafana custom image
        uses: docker/build-push-action@v7
        with:
          context: deploy/grafana
          file: deploy/grafana/Dockerfile
          push: false
          load: false
          cache-from: type=gha,scope=integration-grafana
          cache-to: type=gha,scope=integration-grafana,mode=max

      - name: Validate vector template (vector validate)
        run: bash scripts/validate-vector-template.sh

      - name: Run integration tests
        run: bash scripts/run-integration.sh
        env:
          DOCKER_BUILDKIT: "1"
