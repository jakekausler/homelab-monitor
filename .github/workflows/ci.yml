name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --directory apps/monitor --all-extras

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

      - name: Type check
        run: make typecheck

      - name: Test (with coverage)
        run: make test

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter ui run lint

      - name: Format check
        run: pnpm --filter ui run format-check

      - name: Type check
        run: pnpm --filter ui run typecheck

      - name: Test (with coverage)
        run: pnpm --filter ui run test

      - name: Build
        run: pnpm --filter ui run build

  crg-build:
    name: crg-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: astral-sh/setup-uv@v8
        with:
          python-version-file: .python-version

      - name: Install code-review-graph
        run: uv tool install 'code-review-graph>=1.2,<2.0'

      - name: Build graph
        run: uv tool run code-review-graph build

      - name: Upload graph artifact
        uses: actions/upload-artifact@v7
        with:
          name: crg-graph
          path: .code-review-graph/
          retention-days: 7
