# Activates on v* tags only. Container Dockerfile lands in STAGE-001-015; this workflow is scaffolding until then.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build UI bundle
        run: pnpm --filter ui run build

      # TODO: STAGE-001-015 — Finalize Docker context strategy. UI bundle (apps/ui/dist/)
      # must be copied into the Docker context before the image build. Using repo-root
      # context (`.`) as the canonical monorepo pattern; the Dockerfile will reference
      # apps/ui/dist/ and apps/monitor/ from there. Review COPY paths in the Dockerfile
      # when it lands.
      - name: Build and push backend image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
